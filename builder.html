<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>amiminnie - article editor</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <link rel="stylesheet" href="dark.css" id="theme-style" />
        <link rel="stylesheet" href="style.css" id="production-style" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Alata&family=Overlock:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap"
            rel="stylesheet" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    </head>
    <body>
        <button class="editor-floating-btn btn" onclick="toggleSettingsModal()">
            <i class="bi bi-gear"></i>
        </button>

        <div class="settings-modal" id="settings-modal">
            <div class="modal-content surface">
                <div class="modal-header">
                    <h2>Settings Panel</h2>
                    <button class="close-modal-btn btn" onclick="toggleSettingsModal()"><i class="bi bi-x"></i></button>
                </div>

                <label style="color: var(--accent); margin-bottom: -5px">AUTHENTICATION</label>
                <label>Password</label>
                <input type="password" id="editor-key" placeholder="••••••••" class="txtarea" />
                <label>Article ID</label>
                <input type="text" id="article-tag" placeholder="my-post" class="txtarea" />
                <label style="color: var(--accent); margin-bottom: -5px">Metadata</label>
                <label>Thumbnail</label>
                <div class="input-with-btn">
                    <input type="text" id="thumb-url" placeholder="images/thumbnail.png" class="txtarea" />
                    <button class="action-btn btn" onclick="uploadImageDirect('thumb-url')">
                        <i class="bi bi-upload"></i>
                    </button>
                </div>
                <label>Description</label>
                <textarea
                    id="short-desc"
                    rows="3"
                    placeholder="what it is all about!"
                    class="txtarea"
                    style="margin-bottom: 10px;"
                          ></textarea>
                <button class="publish-btn btnsoft" id="publish-btn" onclick="publishToSupabase()">
                    <i class="bi bi-floppy-fill"></i> Save
                </button>
            </div>
        </div>

        <div id="formatting-toolbar" class="formatting-toolbar">
            <button onclick="formatText('bold')" title="Bold" class="btn">
                <i class="bi bi-type-bold"></i>
            </button>
            <button onclick="formatText('italic')" title="Italic" class="btn">
                <i class="bi bi-type-italic"></i>
            </button>
            <button onclick="formatText('underline')" title="Underline" class="btn">
                <i class="bi bi-type-underline"></i>
            </button>
            <button onclick="formatText('strikeThrough')" title="Strikethrough" class="btn">
                <i class="bi bi-type-strikethrough"></i>
            </button>
            <button onclick="formatText('removeFormat')" title="Clear Formatting" class="btn">
                <i class="bi bi-x"></i>
            </button>
        </div>

        <div class="preview-pane">
            <div class="container">
                <header>
                    <nav>
                        <a href="index.html" onclick="event.preventDefault();">about</a>
                        <a href="archive.html" onclick="event.preventDefault();">archive</a>
                        <a href="articles.html" onclick="event.preventDefault();" class="active">articles</a>
                    </nav>
                </header>

                <main>
                    <article class="thought-content">
                        <h1
                            contenteditable="true"
                            id="canvas-title"
                            class="wysiwyg-editor"
                            placeholder="Title here"></h1>
                        <p>
                            <em
                                contenteditable="true"
                                id="canvas-date"
                                class="wysiwyg-editor"
                                placeholder="go on a date..."></em>
                        </p>

                        <div id="blocks-container"></div>

                        <div class="quick-insert-container">
                            <button onclick="addBlock('p')" class="btn"><i class="bi bi-text-left"></i></button>
                            <button onclick="addBlock('h2')" class="btn"><i class="bi bi-type-h2"></i></button>
                            <button onclick="addBlock('h3')" class="btn"><i class="bi bi-type-h3"></i></button>
                            <button onclick="addBlock('conversation')" class="btn"><i class="bi bi-quote"></i></button>
                            <button onclick="addBlock('ul')" class="btn"><i class="bi bi-list-ul"></i></button>
                            <button onclick="addBlock('thought')" class="btn"><i class="bi bi-image"></i></button>
                            <button onclick="addBlock('hr')" class="btn"><i class="bi bi-reception-0"></i></button>
                            <button onclick="addBlock('html')" class="btn"><i class="bi bi-filetype-html"></i></button>
                        </div>
                    </article>
                </main>

                <footer>
                    <p>
                        hosted by <a href="https://supabase.com" target="_blank" rel="noopener noreferrer">Supabase</a>
                    </p>
                    <p>amiminnie</p>
                </footer>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

        <script>
            const SUB_URL = "https://miwcmqwhudshgetmrmhf.supabase.co";
            const ANON_KEY = "sb_publishable_stheDa15dO1UIajFAVSHmw_hKuIf4GZ";
            const sbPublic = supabase.createClient(SUB_URL, ANON_KEY);

            let blocks = [];
            let currentPreviewTheme = "dark";

            function toggleSettingsModal() {
                const modal = document.getElementById("settings-modal");
                modal.classList.toggle("open");
            }

            window.onclick = function (event) {
                const modal = document.getElementById("settings-modal");
                if (event.target === modal) {
                    modal.classList.remove("open");
                }
            };

            document.addEventListener("selectionchange", handleSelection);

            function handleSelection() {
                const selection = window.getSelection();
                const toolbar = document.getElementById("formatting-toolbar");

                if (!selection || selection.isCollapsed || !selection.toString().trim()) {
                    toolbar.style.display = "none";
                    return;
                }

                let node = selection.anchorNode;
                let withinEditor = false;
                while (node) {
                    if (node.nodeType === Node.ELEMENT_NODE && node.hasAttribute("contenteditable")) {
                        withinEditor = true;
                        break;
                    }
                    node = node.parentNode;
                }

                if (!withinEditor) {
                    toolbar.style.display = "none";
                    return;
                }

                const range = selection.getRangeAt(0);
                const rect = range.getBoundingClientRect();

                toolbar.style.display = "flex";
                toolbar.style.left = `${rect.left + window.scrollX + rect.width / 2 - toolbar.offsetWidth / 2}px`;
                toolbar.style.top = `${rect.top + window.scrollY - toolbar.offsetHeight - 8}px`;
            }

            function formatText(command) {
                document.execCommand(command, false, null);
                const activeEl = document.activeElement;
                if (activeEl && activeEl.hasAttribute("contenteditable")) {
                    const event = new Event("input", { bubbles: true });
                    activeEl.dispatchEvent(event);
                }
            }

            function togglePreviewTheme() {
                const themeLink = document.getElementById("theme-style");
                const btn = document.getElementById("theme-toggle-btn");
                if (currentPreviewTheme === "dark") {
                    themeLink.href = "light.css";
                    currentPreviewTheme = "light";
                    document.body.classList.add("light-theme");
                    btn.innerHTML = `<i class="bi bi-palette-fill"></i> Toggle: Light Mode`;
                } else {
                    themeLink.href = "dark.css";
                    currentPreviewTheme = "dark";
                    document.body.classList.remove("light-theme");
                    btn.innerHTML = `<i class="bi bi-palette-fill"></i> Toggle: Dark Mode`;
                }
            }

            function addBlock(type, content = "", media = "", alt = "", styles = null) {
                const id = Date.now() + Math.random();
                const defaultStyles = styles || {
                    fontSize: "",
                    color: "",
                    bgColor: "",
                    textAlign: "left",
                    customCss: ""
                };

                // Set native sample standard default copy for new dialogue quote containers
                if (type === "conversation" && !content) {
                    content =
                        "<p><i>The dozen may be one of the earliest primitive integer groupings... <strong>Twelve is convenient because it has a maximal number of divisors...</strong></i></p>";
                }

                blocks.push({
                    id,
                    type,
                    v1: content,
                    v2: media,
                    v3: alt,
                    isEditingHtml: false,
                    styles: defaultStyles,
                    showStyles: false
                });
                renderEditor();
            }

            function removeBlock(id) {
                blocks = blocks.filter((b) => b.id !== id);
                renderEditor();
            }

            function moveBlock(fromIndex, toIndex) {
                if (toIndex < 0 || toIndex >= blocks.length) return;
                const [movedItem] = blocks.splice(fromIndex, 1);
                blocks.splice(toIndex, 0, movedItem);
                renderEditor();
            }

            function updateBlockValue(id, field, value) {
                const b = blocks.find((x) => x.id === id);
                if (b) b[field] = value;
            }

            function toggleBlockStyles(id) {
                const b = blocks.find((x) => x.id === id);
                if (b) {
                    b.showStyles = !b.showStyles;
                    renderEditor();
                }
            }

            function updateBlockStyleLive(id, prop, value) {
                const b = blocks.find((x) => x.id === id);
                if (!b) return;
                if (!b.styles) b.styles = {};
                b.styles[prop] = value;

                const el = document.getElementById(`block-content-${id}`);
                if (el) applyStylesToElement(el, b.styles);

                if (prop === "fontSize") {
                    const label = document.getElementById(`lbl-size-${id}`);
                    if (label) label.innerText = `${value}rem`;
                }
            }

            function applyStylesToElement(el, styles) {
                if (!styles || !el) return;
                el.style.fontSize = styles.fontSize ? `${styles.fontSize}rem` : "";
                el.style.color = styles.color || "";
                el.style.backgroundColor = styles.bgColor || "";
                el.style.textAlign = styles.textAlign || "";

                let inlineStyle = el.getAttribute("style") || "";
                if (styles.customCss) {
                    el.style.cssText = inlineStyle + "; " + styles.customCss;
                }
            }

            function getBlockStyleString(b) {
                if (!b.styles) return "";
                let style = "";
                if (b.styles.fontSize) style += `font-size: ${b.styles.fontSize}rem; `;
                if (b.styles.color) style += `color: ${b.styles.color}; `;
                if (b.styles.bgColor) style += `background-color: ${b.styles.bgColor}; `;
                if (b.styles.textAlign && b.styles.textAlign !== "left") style += `text-align: ${b.styles.textAlign}; `;
                if (b.styles.customCss) style += `${b.styles.customCss}; `;
                return style.trim() ? ` style="${style.trim()}"` : "";
            }

            async function uploadImageDirect(inputFieldId) {
                const password = document.getElementById("editor-key").value;
                if (!password) {
                    alert("Enter Database Key Password first!");
                    return;
                }

                const fileInput = document.createElement("input");
                fileInput.type = "file";
                fileInput.accept = "image/*";

                fileInput.onchange = async (e) => {
                    const file = e.target.files[0];
                    if (!file) return;

                    const sbAdmin = supabase.createClient(SUB_URL, ANON_KEY, {
                        global: { headers: { "x-editor-key": password } }
                    });

                    const fileName = `${Date.now()}-${file.name.replace(/\s/g, "_")}`;
                    const { data, error } = await sbAdmin.storage.from("blog-assets").upload(fileName, file);

                    if (error) {
                        alert("Upload failed: " + error.message);
                    } else {
                        const publicUrl = `${SUB_URL}/storage/v1/object/public/blog-assets/${fileName}`;
                        document.getElementById(inputFieldId).value = publicUrl;
                    }
                };
                fileInput.click();
            }

            async function uploadBlockImage(id) {
                const password = document.getElementById("editor-key").value;
                if (!password) {
                    alert("Enter Database Key Password in the settings popup first!");
                    return;
                }

                const fileInput = document.createElement("input");
                fileInput.type = "file";
                fileInput.accept = "image/*";

                fileInput.onchange = async (e) => {
                    const file = e.target.files[0];
                    if (!file) return;

                    const sbAdmin = supabase.createClient(SUB_URL, ANON_KEY, {
                        global: { headers: { "x-editor-key": password } }
                    });

                    const fileName = `${Date.now()}-${file.name.replace(/\s/g, "_")}`;
                    const { data, error } = await sbAdmin.storage.from("blog-assets").upload(fileName, file);

                    if (error) {
                        alert("Upload failed: " + error.message);
                    } else {
                        const publicUrl = `${SUB_URL}/storage/v1/object/public/blog-assets/${fileName}`;
                        updateBlockValue(id, "v2", publicUrl);
                        renderEditor();
                    }
                };
                fileInput.click();
            }

            function toggleHtmlEdit(id) {
                const b = blocks.find((x) => x.id === id);
                if (b) {
                    b.isEditingHtml = !b.isEditingHtml;
                    renderEditor();
                }
            }

            function renderEditor() {
                const container = document.getElementById("blocks-container");
                container.innerHTML = "";

                blocks.forEach((b, index) => {
                    const wrapper = document.createElement("div");
                    wrapper.className = "block-wrapper";
                    wrapper.dataset.index = index;

                    wrapper.addEventListener("dragstart", (e) => {
                        wrapper.classList.add("dragging");
                        e.dataTransfer.setData("text/plain", index);
                    });
                    wrapper.addEventListener("dragend", (e) => {
                        wrapper.classList.remove("dragging");
                        wrapper.removeAttribute("draggable");
                    });
                    wrapper.addEventListener("dragover", (e) => e.preventDefault());
                    wrapper.addEventListener("drop", (e) => {
                        e.preventDefault();
                        const draggedIndex = parseInt(e.dataTransfer.getData("text/plain"));
                        if (draggedIndex !== index) moveBlock(draggedIndex, index);
                    });

                    const controls = document.createElement("div");
                    controls.className = "block-controls";
                    controls.innerHTML = `
                        <button class="drag-handle btn" title="Drag to Reorder"><i class="bi bi-grip-vertical"></i></button>
                        <button onclick="toggleBlockStyles(${b.id})" title="Toggle Styles" class="btn"><i class="bi bi-palette"></i></button>
                        <button onclick="removeBlock(${b.id})" title="Delete Block" class="btn"><i class="bi bi-trash3"></i></button>
                    `;
                    wrapper.appendChild(controls);

                    const handle = controls.querySelector(".drag-handle");
                    handle.addEventListener("mousedown", () => wrapper.setAttribute("draggable", "true"));
                    handle.addEventListener("mouseup", () => wrapper.removeAttribute("draggable"));
                    handle.addEventListener("mouseleave", () => wrapper.removeAttribute("draggable"));

                    if (b.showStyles) {
                        const stylesPanel = document.createElement("div");
                        stylesPanel.className = "block-styles-panel surface";
                        const currentSize = b.styles?.fontSize || "1.0";
                        const currentColor = b.styles?.color || "#ffffff";
                        const currentBg = b.styles?.bgColor || "#000000";
                        const currentAlign = b.styles?.textAlign || "left";
                        const currentCss = b.styles?.customCss || "";

                        stylesPanel.innerHTML = `
                            <div class="style-group" >
                                <label>Size (<span id="lbl-size-${b.id}">${currentSize}rem</span>)</label>
                                <input type="range" min="0.5" max="3.5" step="0.1" value="${currentSize}" oninput="updateBlockStyleLive(${b.id}, 'fontSize', this.value)" />
                            </div>
                            <div class="style-group">
                                <label>Text</label>
                                <input type="color" value="${currentColor}" oninput="updateBlockStyleLive(${b.id}, 'color', this.value)" title="Text Color" />
                            </div>
                            <div class="style-group">
                                <label>BG</label>
                                <input type="color" value="${currentBg}" oninput="updateBlockStyleLive(${b.id}, 'bgColor', this.value)" title="Background Color" />
                            </div>
                            <div class="style-group">
                                <div class="align-btn-group">
                                    <button class="align-btn ${currentAlign === "left" ? "active" : ""} btn" onclick="updateBlockStyleLive(${b.id}, 'textAlign', 'left'); renderEditor();" title="Align Left"><i class="bi bi-text-left"></i></button>
                                    <button class="align-btn ${currentAlign === "center" ? "active" : ""} btn" onclick="updateBlockStyleLive(${b.id}, 'textAlign', 'center'); renderEditor();" title="Align Center"><i class="bi bi-text-center"></i></button>
                                    <button class="align-btn ${currentAlign === "right" ? "active" : ""} btn" onclick="updateBlockStyleLive(${b.id}, 'textAlign', 'right'); renderEditor();" title="Align Right"><i class="bi bi-text-right"></i></button>
                                </div>
                            </div>
                            <div class="style-group" style="flex-grow:1;">
                                <label>Custom</label>
                                <input type="text" class="txtarea"  value="${currentCss}" oninput="updateBlockStyleLive(${b.id}, 'customCss', this.value)" style="width:100%;" />
                            </div>
                        `;
                        wrapper.appendChild(stylesPanel);
                    }

                    let contentNode;

                    if (b.type === "p") {
                        contentNode = document.createElement("p");
                        contentNode.className = "wysiwyg-editor";
                        contentNode.contentEditable = "true";
                        contentNode.setAttribute("placeholder", "Click to type paragraph content...");
                        contentNode.innerHTML = b.v1 || "";
                        contentNode.addEventListener("input", (e) => updateBlockValue(b.id, "v1", e.target.innerHTML));
                    } else if (b.type === "h2") {
                        contentNode = document.createElement("h2");
                        contentNode.className = "wysiwyg-editor";
                        contentNode.contentEditable = "true";
                        contentNode.setAttribute("placeholder", "Header 2");
                        contentNode.innerHTML = b.v1 || "";
                        contentNode.addEventListener("input", (e) => updateBlockValue(b.id, "v1", e.target.innerHTML));
                    } else if (b.type === "h3") {
                        contentNode = document.createElement("h3");
                        contentNode.className = "wysiwyg-editor";
                        contentNode.contentEditable = "true";
                        contentNode.setAttribute("placeholder", "Header 3");
                        contentNode.innerHTML = b.v1 || "";
                        contentNode.addEventListener("input", (e) => updateBlockValue(b.id, "v1", e.target.innerHTML));
                    } else if (b.type === "conversation") {
                        contentNode = document.createElement("div");
                        contentNode.className = "conversation wysiwyg-editor";
                        contentNode.contentEditable = "true";
                        contentNode.setAttribute("placeholder", "Enter dialogue or quote box text content...");
                        contentNode.innerHTML = b.v1 || "";
                        contentNode.addEventListener("input", (e) => updateBlockValue(b.id, "v1", e.target.innerHTML));
                    } else if (b.type === "hr") {
                        contentNode = document.createElement("hr");
                        contentNode.style.margin = "2rem 0";
                    } else if (b.type === "ul") {
                        contentNode = document.createElement("ul");
                        contentNode.className = "wysiwyg-editor";
                        contentNode.contentEditable = "true";
                        contentNode.setAttribute("placeholder", "• Item 1 (Press shift+enter for new lines)");
                        contentNode.innerHTML = b.v1 || "<li></li>";
                        contentNode.addEventListener("input", (e) => updateBlockValue(b.id, "v1", e.target.innerHTML));
                    } else if (b.type === "html") {
                        contentNode = document.createElement("div");
                        contentNode.className = "html-block-container";
                        if (b.isEditingHtml) {
                            contentNode.innerHTML = `
                                <span class="html-badge">Editing Code</span>
                                <textarea class="html-editor-textarea" rows="8">${b.v1 || ""}</textarea>
                                <button onclick="toggleHtmlEdit(${b.id})" style="margin-top:8px; width:100%; font-size:11px; background:#222; color:#fff; border:1px solid #444; padding:6px; cursor:pointer;">Render Output</button>
                            `;
                            const txt = contentNode.querySelector("textarea");
                            txt.addEventListener("input", (e) => updateBlockValue(b.id, "v1", e.target.value));
                        } else {
                            contentNode.innerHTML = `
                                <span class="html-badge">HTML Output</span>
                                <div>${b.v1 || "<p style='color:#666; font-style:italic;'>[Empty HTML Block - Click to Edit Code]</p>"}</div>
                                <button class="media-overlay-btn btn" onclick="toggleHtmlEdit(${b.id})" style="display:block; bottom: 8px; top:auto; transform:translateX(-50%);">Edit HTML Code</button>
                            `;
                        }
                    } else if (b.type === "thought") {
                        contentNode = document.createElement("div");
                        contentNode.className = "thought-row";

                        const textDiv = document.createElement("div");
                        textDiv.className = "thought-text wysiwyg-editor";
                        textDiv.contentEditable = "true";
                        textDiv.setAttribute("placeholder", "Write block text descriptive content here...");
                        textDiv.innerHTML = b.v1 || "";
                        textDiv.addEventListener("input", (e) => updateBlockValue(b.id, "v1", e.target.innerHTML));

                        const mediaDiv = document.createElement("div");
                        mediaDiv.className = "thought-media";
                        const defaultImg = b.v2 || "images/gallery.png";
                        mediaDiv.innerHTML = `
                            <img src="${defaultImg}" alt="${b.v3 || "Article Graphic"}" />
                            <button class="media-overlay-btn btn" onclick="uploadBlockImage(${b.id})">Upload Image</button>
                        `;

                        contentNode.appendChild(textDiv);
                        contentNode.appendChild(mediaDiv);
                    }

                    contentNode.id = `block-content-${b.id}`;
                    applyStylesToElement(contentNode, b.styles);

                    wrapper.appendChild(contentNode);
                    container.appendChild(wrapper);
                });
            }

            function compileHTML() {
                const title = document.getElementById("canvas-title").innerText || "Article Title";
                const date = document.getElementById("canvas-date").innerText || "Publication Date";

                let html = `<h1>${title}</h1>\n<p><em>${date}</em></p>\n`;

                blocks.forEach((b) => {
                    const styleStr = getBlockStyleString(b);
                    if (b.type === "p" && b.v1) {
                        html += `<p${styleStr}>${b.v1}</p>\n`;
                    } else if (b.type === "h2" && b.v1) {
                        html += `<h2${styleStr}>${b.v1}</h2>\n`;
                    } else if (b.type === "h3" && b.v1) {
                        html += `<h3${styleStr}>${b.v1}</h3>\n`;
                    } else if (b.type === "conversation" && b.v1) {
                        html += `<div class="conversation"${styleStr}>\n${b.v1}\n</div>\n`;
                    } else if (b.type === "hr") {
                        html += `<hr${styleStr}>\n`;
                    } else if (b.type === "html" && b.v1) {
                        html += `${b.v1}\n`;
                    } else if (b.type === "ul" && b.v1) {
                        html += `<ul${styleStr}>\n${b.v1}\n</ul>\n`;
                    } else if (b.type === "thought") {
                        html += `
                            <div class="thought-row"${styleStr}>
                                <div class="thought-text"><p>${b.v1}</p></div>
                                <div class="thought-media"><img src="${b.v2}" alt="${b.v3}" /></div>
                            </div>\n`;
                    }
                });
                return html;
            }

            async function publishToSupabase() {
                const password = document.getElementById("editor-key").value;
                const tag = document.getElementById("article-tag").value;
                const btn = document.getElementById("publish-btn");

                if (!password || !tag) {
                    alert("Key and Unique Article Tag are required.");
                    return;
                }

                const sbAdmin = supabase.createClient(SUB_URL, ANON_KEY, {
                    global: { headers: { "x-editor-key": password } }
                });

                btn.innerText = "SAVING DATA...";
                btn.disabled = true;

                const compiledOutput = compileHTML();

                const { error } = await sbAdmin.from("blogs").upsert(
                    {
                        tag: tag,
                        title: document.getElementById("canvas-title").innerText,
                        description: document.getElementById("short-desc").value,
                        date: document.getElementById("canvas-date").innerText,
                        thumbnail_url: document.getElementById("thumb-url").value,
                        content: compiledOutput,
                        raw_json: blocks
                    },
                    { onConflict: "tag" }
                );

                if (error) alert("Error: " + error.message);
                else {
                    alert("Article successfully synced onto DB instance!");
                    toggleSettingsModal();
                }

                btn.innerText = "SAVE TO DATABASE";
                btn.disabled = false;
            }

            window.onload = async () => {
                const urlParams = new URLSearchParams(window.location.search);
                const editTag = urlParams.get("edit");

                if (editTag) {
                    const { data } = await sbPublic.from("blogs").select("*").eq("tag", editTag).single();
                    if (data) {
                        document.getElementById("article-tag").value = data.tag;
                        document.getElementById("canvas-title").innerText = data.title || "";
                        document.getElementById("canvas-date").innerText = data.date || "";
                        document.getElementById("thumb-url").value = data.thumbnail_url || "";
                        document.getElementById("short-desc").value = data.description || "";

                        if (data.raw_json && Array.isArray(data.raw_json)) {
                            blocks = data.raw_json;
                            renderEditor();
                        } else {
                            blocks = [];
                            addBlock("p", data.content);
                        }
                    }
                } else {
                    addBlock("p");
                }
            };
        </script>
    </body>
</html>
