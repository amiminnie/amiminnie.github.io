<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>The Coffee Quest</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="color-scheme" content="light dark" />
        <meta name="theme-color" content="#111111" />

        <link id="theme-style" rel="stylesheet" href="../light.css" />
        <link id="style" rel="stylesheet" href="../style.css" />

        <link rel="icon" href="../images/favicon.ico" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Overlock:wght@400;700;900&display=swap" rel="stylesheet" />

        <style>
            /* Layout for the integrated inventory system */
            .inventory-grid {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 12px;
                padding: 10px 0;
            }

            .inventory-item {
                background: rgba(0, 0, 0, 0.05);
                border: 1px solid rgba(0, 0, 0, 0.15);
                border-radius: 6px;
                padding: 8px;
                text-align: center;
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            /* CSS Sprite setup for the 2000x2000px atlas (4x4 items) */
            .item-sprite {
                width: 64px;
                height: 64px;
                background-image: url("coffee.png");
                background-size: 400% 400%;
                background-repeat: no-repeat;
            }

            .item-name {
                font-size: 0.85rem;
                font-weight: 700;
                margin-top: 4px;
            }

            .item-count {
                font-size: 0.8rem;
                opacity: 0.7;
            }

            /* Quick dev triggers for adding items */
            .test-controls {
                margin-top: 15px;
                padding: 10px;
                border: 1px dashed #ccc;
            }
            .test-btn {
                padding: 4px 8px;
                margin-right: 5px;
                cursor: pointer;
            }
        </style>
    </head>

    <body>
        <div class="container">
            <main>
                <section class="intro">
                    <h1 style="color: var(--text-main); font-size: 3rem">The Coffee Quest!</h1>
                    <p>
                        Collect all the ingredients and make the best coffee in the world. Become the champion of coffee
                        making!
                    </p>

                </section>
                <div class="tabs">
                    <div id="inventory-grid" class="inventory-grid"></div>
                </div>
            </main>

            <footer>
                <p>amiminnie</p>
            </footer>
        </div>

        <script>
            // Theme toggle persistence
            const themeLink = document.getElementById("theme-style");
            const savedTheme = localStorage.getItem("theme") || "dark";
            setTheme(savedTheme);

            function setTheme(theme) {
                localStorage.setItem("theme", theme);
                themeLink.href = theme === "dark" ? "../dark.css" : "../light.css";
            }

            // Definitions mapping positions on the 4x4 matrix
            const items = [
                { id: "beans", name: "Coffee Beans", row: 0, col: 0 },
                { id: "ground_coffee", name: "Ground Coffee", row: 1, col: 0 },
                { id: "espresso", name: "Espresso Shot", row: 1, col: 1 },
                { id: "coffee", name: "Coffee", row: 3, col: 3 },

                { id: "milk", name: "Whole Milk", row: 0, col: 1 },
                { id: "cream", name: "Cream", row: 3, col: 3 },
                { id: "coconut_milk", name: "Coconut Milk", row: 3, col: 3 },
                { id: "water", name: "Water", row: 3, col: 3 },

                { id: "sugar_cubes", name: "Sugar Cubes", row: 0, col: 3},
                { id: "brown_sugar", name: "Brown Sugar", row: 2, col: 1 },
                { id: "honey", name: "Honey", row: 2, col: 2 },
                { id: "maple_syrup", name: "Maple Syrup", row: 2, col: 3 },

                { id: "cinnamon", name: "Cinnamon", row: 3, col: 0 },
                { id: "cocoa_powder", name: "Cocoa Powder", row: 3, col: 1 },
                { id: "vanilla_extract", name: "Vanilla Extract", row: 3, col: 2 },
                { id: "ginger", name: "Ginger", row: 3, col: 3 }
            ];

            // Cookie Utilities
            function writeCookie(key, val) {
                const d = new Date();
                d.setTime(d.getTime() + 365 * 24 * 60 * 60 * 1000);
                document.cookie = `${key}=${val}; expires=${d.toUTCString()}; path=/; SameSite=Strict`;
            }

            function readCookie(key) {
                const match = document.cookie.match(new RegExp("(^| )" + key + "=([^;]+)"));
                return match ? match[2] : null;
            }

            // Sync structural states
            function buildDisplay() {
                const container = document.getElementById("inventory-grid");
                container.innerHTML = "";

                items.forEach((item) => {
                    const count = parseInt(readCookie(`q_${item.id}`) || "0", 10);

                    // Grid coordinates converted to percentage positions
                    const xPercent = (item.col / 3) * 100;
                    const yPercent = (item.row / 3) * 100;

                    const card = document.createElement("div");
                    card.className = "inventory-item";
                    card.innerHTML = `
                        <div class="item-sprite" style="background-position: ${xPercent}% ${yPercent}%;"></div>
                        <div class="item-name">${item.name}</div>
                        <div class="item-count">x${count}</div>
                    `;
                    container.appendChild(card);
                });
            }

            function modifyItem(id, quantity) {
                const current = parseInt(readCookie(`q_${id}`) || "0", 10);
                const updated = Math.max(0, current + quantity);
                writeCookie(`q_${id}`, updated);
                buildDisplay();
            }

            // Initialization execution
            buildDisplay();
        </script>
    </body>
</html>
