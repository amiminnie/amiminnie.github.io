<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>amiminnie - articles</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#111111" />
    <link id="theme-style" rel="stylesheet" href="light.css" />
    <link id="style" rel="stylesheet" href="style.css" />
    <link rel="icon" href="images/favicon.ico" />

    <script src="common.js" type="module"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Overlock:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap"
      rel="stylesheet" />

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <style>
      /* Hide admin elements by default */
      .admin-toolbar,
      .item-actions {
        display: none;
      }

      .admin-toolbar {
        justify-content: flex-end;
        margin-bottom: 2rem;
      }
      .btn-add {
        background: none;
        border: 1px solid #333;
        color: inherit;
        padding: 6px 14px;
        cursor: pointer;
        font-family: "Overlock", sans-serif;
        border-radius: 4px;
        font-size: 0.85rem;
        transition: 0.2s;
      }
      .btn-add:hover {
        border-color: #4caf50;
        color: #4caf50;
      }

      .thought-item {
        position: relative;
      }

      .item-actions {
        position: absolute;
        top: 0;
        right: 0;
        gap: 12px;
      }
      .action-link {
        background: none;
        border: none;
        font-family: "Overlock", sans-serif;
        font-size: 0.7rem;
        cursor: pointer;
        letter-spacing: 1px;
        opacity: 0.5;
        transition: 0.2s;
      }
      .action-link:hover {
        opacity: 1;
      }
      .edit-color {
        color: #4caf50;
      }
      .delete-color {
        color: #ff5252;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <header>
        <nav>
          <a href="index.html">about</a>
          <a href="gallery.html">gallery</a>
          <a href="" class="active">articles</a>
          <button id="theme-toggle" class="theme-btn" title="Dark mode extensions may interfere with this!">
            <img id="theme-icon" src="images/moon-icon.png" alt="Toggle theme" />
          </button>
        </nav>
      </header>

      <main>
        <section class="intro">
          <p class="prefix">some</p>
          <h1>articles</h1>
          <p class="subtitle">
            has been moved to the cloud recently, no idea what kind of ungodly horrors the process has created
          </p>
        </section>

        <section class="thoughts">
          <div class="admin-toolbar" id="admin-toolbar">
            <button class="btn-add" onclick="window.location.href='builder.html'">+ write new post</button>
          </div>

          <ul id="thoughts-list" class="thoughts-list">
            <li>loading...</li>
          </ul>
        </section>
      </main>

      <footer>
        <p>hosted by <a href="https://supabase.com" target="_blank" rel="noopener noreferrer">Supabase</a></p>
        <p>amiminnie</p>
      </footer>
    </div>

    <script>
      const themeLink = document.getElementById("theme-style");
      const toggleBtn = document.getElementById("theme-toggle");
      const themeIcon = document.getElementById("theme-icon");

      const savedTheme = localStorage.getItem("theme");

      function setTheme(mode) {
        if (mode === "dark") {
          themeLink.href = "dark.css";
          document.documentElement.style.colorScheme = "dark";
          themeIcon.src = "images/sun-icon.png";
          themeIcon.alt = "light mode";
          localStorage.setItem("theme", "dark");
        } else {
          themeLink.href = "light.css";
          document.documentElement.style.colorScheme = "light";
          themeIcon.src = "images/moon-icon.png";
          themeIcon.alt = "dark mode";
          localStorage.setItem("theme", "light");
        }
      }

      if (savedTheme) {
        setTheme(savedTheme);
      } else {
        setTheme("dark");
      }

      toggleBtn.addEventListener("click", () => {
        themeIcon.style.transform = "scale(0)";
        setTimeout(() => {
          const current = localStorage.getItem("theme");
          setTheme(current === "dark" ? "light" : "dark");
          void themeIcon.offsetWidth;
          themeIcon.style.transform = "scale(1)";
        }, 120);
      });
    </script>

    <script>
      const SUB_URL = "https://miwcmqwhudshgetmrmhf.supabase.co";
      const SUB_KEY = "sb_publishable_stheDa15dO1UIajFAVSHmw_hKuIf4GZ";
      const supabaseClient = supabase.createClient(SUB_URL, SUB_KEY);

      // Check if user is in admin mode (?admin=true)
      const urlParams = new URLSearchParams(window.location.search);
      const isAdmin = urlParams.get("admin") === "true";

      async function loadThoughts() {
        const list = document.getElementById("thoughts-list");
        const toolbar = document.getElementById("admin-toolbar");

        // Show toolbar if admin query parameter is true
        if (isAdmin) {
          toolbar.style.display = "flex";
        }

        try {
          const { data: items, error } = await supabaseClient
            .from("blogs")
            .select("tag, title, description, date")
            .order("id", { ascending: false });

          if (error) throw error;

          list.innerHTML = "";

          items.forEach((item) => {
            const div = document.createElement("div");
            div.className = "thought-item";

            // Generate Admin buttons dynamically if isAdmin is true
            const adminButtons = isAdmin
              ? `
              <div class="item-actions" style="display: flex;">
                <button class="action-link edit-color" onclick="editArticle('${item.tag}')"><span class="material-symbols-outlined"> edit </span></button>
                <button class="action-link delete-color" onclick="deleteArticle('${item.tag}')"><span class="material-symbols-outlined"> delete </span></button>
              </div>`
              : "";

            // Using amiminnie's specific HTML structure and CSS classes
            div.innerHTML = `
              <a class="thought-link" href="read.html#${item.tag}">
                  <h3 class="gallery-title">${item.title}</h3>
                  <p class="gallery-description"><i>${item.description}</i></p>
                  <p class="gallery-date"><em>${item.date}</em></p>
              </a>
              ${adminButtons}
            `;
            list.appendChild(div);
          });
        } catch (err) {
          list.innerHTML = `<li>Could not load articles.</li>`;
          console.error(err);
        }
      }

      async function deleteArticle(tag) {
        const password = prompt("Enter Editor Password to delete this post:");
        if (!password) return;

        if (confirm(`Are you sure you want to permanently delete "${tag}"?`)) {
          const sbAuth = supabase.createClient(SUB_URL, SUB_KEY, {
            global: { headers: { "x-editor-key": password } }
          });

          const { error } = await sbAuth.from("blogs").delete().eq("tag", tag);

          if (error) {
            alert("Delete failed: " + error.message);
          } else {
            alert("Article removed.");
            loadThoughts();
          }
        }
      }

      function editArticle(tag) {
        window.location.href = `builder.html?edit=${tag}`;
      }

      loadThoughts();
    </script>
  </body>
</html>
