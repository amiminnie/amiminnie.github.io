<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>amiminnie - articles</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#111111" />
    <link id="theme-style" rel="stylesheet" href="light.css" />
    <link id="style" rel="stylesheet" href="style.css" />
    <link rel="icon" href="images/favicon.ico" />

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Overlock:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap"
      rel="stylesheet" />

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  </head>

  <body>
    <aside class="desktop-sidebar">
      <ul id="sidebar-thoughts-list" class="sidebar-list">
        </ul>
    </aside>

    <div class="container">
      <header>
        <nav id="main-nav">
          <button class="nav-back-btn" onclick="window.location.hash = ''" >
            <span class="material-symbols-outlined">arrow_back</span>
            <span>back</span>
          </button>
          
          <a href="index.html">about</a>
          <a href="gallery.html">gallery</a>
          <a href="articles.html" class="active">articles</a>

          <button id="theme-toggle" class="theme-btn" title="Dark mode extensions may interfere with this!">
            <img id="theme-icon" src="images/moon-icon.png" alt="Toggle theme" />
          </button>
        </nav>
      </header>

      <main class="view-slider-window">
        <div id="view-track" class="view-slider-track">
          
          <div id="list-view">
            <section class="intro">
              <p class="prefix">some</p>
              <h1>articles</h1>
              <p class="subtitle">
                has been moved to the cloud recently, no idea what kind of ungodly horrors the process has created
              </p>
            </section>

            <section class="thoughts">
              <div class="admin-toolbar" id="admin-toolbar">
                <button class="btn-add" onclick="window.location.href='builder.html'">+ write new post</button>
              </div>

              <ul id="thoughts-list" class="thoughts-list">
                <li>loading...</li>
              </ul>
            </section>
          </div>

          <div id="read-view">
            <article id="thought-content" class="thought-content">
            </article>

            <section class="social-list" style="border: none">
              <a class="social-item" href="index.html#guestbook">
                <img src="images/comment.png" alt="gallery" />
                <div class="social-text">
                  <h2>leave a comment &gt;&gt;</h2>
                  <p>i'd appreceate to read what you have to say about this!</p>
                </div>
              </a>
            </section>
          </div>

        </div>
      </main>

      <footer>
        <p>hosted by <a href="https://supabase.com" target="_blank" rel="noopener noreferrer">Supabase</a></p>
        <p>amiminnie</p>
      </footer>
    </div>

    <script>
      const themeLink = document.getElementById("theme-style");
      const toggleBtn = document.getElementById("theme-toggle");
      const themeIcon = document.getElementById("theme-icon");

      const savedTheme = localStorage.getItem("theme");

      function setTheme(mode) {
        if (mode === "dark") {
          themeLink.href = "dark.css";
          document.documentElement.style.colorScheme = "dark";
          themeIcon.src = "images/sun-icon.png";
          themeIcon.alt = "light mode";
          localStorage.setItem("theme", "dark");
        } else {
          themeLink.href = "light.css";
          document.documentElement.style.colorScheme = "light";
          themeIcon.src = "images/moon-icon.png";
          themeIcon.alt = "dark mode";
          localStorage.setItem("theme", "light");
        }
      }

      if (savedTheme) {
        setTheme(savedTheme);
      } else {
        setTheme("dark");
      }

      toggleBtn.addEventListener("click", () => {
        themeIcon.style.transform = "scale(0)";
        setTimeout(() => {
          const current = localStorage.getItem("theme");
          setTheme(current === "dark" ? "light" : "dark");
          void themeIcon.offsetWidth;
          themeIcon.style.transform = "scale(1)";
        }, 120);
      });
    </script>

    <script>
      const SUB_URL = "https://miwcmqwhudshgetmrmhf.supabase.co";
      const SUB_KEY = "sb_publishable_stheDa15dO1UIajFAVSHmw_hKuIf4GZ";
      const supabaseClient = supabase.createClient(SUB_URL, SUB_KEY);

      const urlParams = new URLSearchParams(window.location.search);
      const isAdmin = urlParams.get("admin") === "true";

      let fetchedArticlesCache = [];

      async function loadThoughts() {
        const list = document.getElementById("thoughts-list");
        const sidebarList = document.getElementById("sidebar-thoughts-list");
        const toolbar = document.getElementById("admin-toolbar");

        if (isAdmin) {
          toolbar.style.display = "flex";
        }

        try {
          if (fetchedArticlesCache.length === 0) {
            const { data: items, error } = await supabaseClient
              .from("blogs")
              .select("tag, title, description, date")
              .order("id", { ascending: false });

            if (error) throw error;
            fetchedArticlesCache = items;
          }

          // 1. Core full-sized listing component
          list.innerHTML = "";
          fetchedArticlesCache.forEach((item) => {
            const div = document.createElement("div");
            div.className = "thought-item";

            const adminButtons = isAdmin
              ? `
              <div class="item-actions" style="display: flex;">
                <button class="action-link edit-color" onclick="editArticle('${item.tag}')"><span class="material-symbols-outlined"> edit </span></button>
                <button class="action-link delete-color" onclick="deleteArticle('${item.tag}')"><span class="material-symbols-outlined"> delete </span></button>
              </div>`
              : "";

            div.innerHTML = `
              <a class="thought-link" href="#${item.tag}">
                  <h3 class="gallery-title">${item.title}</h3>
                  <p class="gallery-description"><i>${item.description}</i></p>
                  <p class="gallery-date"><em>${item.date}</em></p>
              </a>
              ${adminButtons}
            `;
            list.appendChild(div);
          });

          // 2. Ultra-compact navigation layout listing (Title only)
          sidebarList.innerHTML = "";
          fetchedArticlesCache.forEach((item) => {
            const li = document.createElement("li");
            li.className = "sidebar-item";
            li.setAttribute("data-tag", item.tag);
            li.innerHTML = `
              <a href="#${item.tag}" title="${item.title}">
                ${item.title}
              </a>
            `;
            sidebarList.appendChild(li);
          });

          highlightActiveSidebar();

        } catch (err) {
          list.innerHTML = `<li>Could not load articles.</li>`;
          sidebarList.innerHTML = `<li>Could not load layout.</li>`;
          console.error(err);
        }
      }

      function highlightActiveSidebar() {
        const currentTag = window.location.hash.substring(1);
        const sidebarItems = document.querySelectorAll(".sidebar-item");
        
        sidebarItems.forEach((item) => {
          if (item.getAttribute("data-tag") === currentTag) {
            item.classList.add("active-article");
          } else {
            item.classList.remove("active-article");
          }
        });
      }

      async function loadThought(tag) {
        const container = document.getElementById("thought-content");
        const track = document.getElementById("view-track");
        
        try {
          const { data: post, error } = await supabaseClient
            .from('blogs')
            .select('title, content')
            .eq('tag', tag)
            .single();

          if (error || !post) {
            container.innerHTML = "<p>i havent thought of that yet</p>";
            track.classList.add("show-article");
            return;
          }

          container.innerHTML = post.content;

          const scripts = container.querySelectorAll("script");
          scripts.forEach((oldScript) => {
            const newScript = document.createElement("script");
            Array.from(oldScript.attributes).forEach((attr) => {
              newScript.setAttribute(attr.name, attr.value);
            });
            newScript.appendChild(document.createTextNode(oldScript.innerHTML));
            oldScript.parentNode.replaceChild(newScript, oldScript);
          });
          
          document.title = `amiminnie - ${post.title}`;
          
          track.classList.add("show-article");
          window.scrollTo({ top: 0, behavior: 'smooth' });

        } catch (err) {
          container.innerHTML = "<p>i think i got distracted</p>";
          track.classList.add("show-article");
          console.error(err);
        }
      }

      function handleRouting() {
        const track = document.getElementById("view-track");
        const container = document.getElementById("thought-content");
        const mainNav = document.getElementById("main-nav");
        const tag = window.location.hash.substring(1);

        highlightActiveSidebar();

        if (tag) {
          // Inside an active article: toggle layout state variables
          document.body.classList.add("article-open");
          mainNav.classList.add("article-active");
          container.innerHTML = "<p>Loading thought...</p>";
          loadThought(tag);
        } else {
          // Returning back to home index overview: clear layout toggles instantly
          document.body.classList.remove("article-open");
          mainNav.classList.remove("article-active");
          track.classList.remove("show-article");
          container.innerHTML = "";
          document.title = "amiminnie - articles";
        }
      }

      async function deleteArticle(tag) {
        const password = prompt("Enter Editor Password to delete this post:");
        if (!password) return;

        if (confirm(`Are you sure you want to permanently delete "${tag}"?`)) {
          const sbAuth = supabase.createClient(SUB_URL, SUB_KEY, {
            global: { headers: { "x-editor-key": password } }
          });

          const { error } = await sbAuth.from("blogs").delete().eq("tag", tag);

          if (error) {
            alert("Delete failed: " + error.message);
          } else {
            alert("Article removed.");
            fetchedArticlesCache = []; 
            loadThoughts().then(() => handleRouting());
          }
        }
      }

      function editArticle(tag) {
        window.location.href = `builder.html?edit=${tag}`;
      }

      window.addEventListener("hashchange", handleRouting);
      
      // Initialize list rendering pipelines
      loadThoughts().then(() => handleRouting());
    </script>
  </body>
</html>
