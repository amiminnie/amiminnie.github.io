<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AMIBIOS community machine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Sixtyfour&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      :root {
        --glow: #33ff33;
        --bg: #050505;
        --phosphor-dim: rgba(51, 255, 51, 0.4);
      }

      * {
        -webkit-font-smoothing: none;
        -moz-osx-font-smoothing: grayscale;
        box-sizing: border-box;
      }

      body, html {
        background-color: #000;
        color: var(--glow);
        font-family: 'Sixtyfour', sans-serif;
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }

      /* CRT Monitor Container */
      .monitor {
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 2vw;
        background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
      }

      /* The actual screen with slight curvature */
      .terminal-container {
        font-size: clamp(8px, 1.5vw, 16px);
        width: 100%;
        max-width: 1200px;
        height: 100%;
        max-height: 90vh;
        position: relative;
        padding: 4ch;
        background: var(--bg);
        border: 2px solid #111;
        border-radius: 16px;
        box-shadow: inset 0 0 100px rgba(0,0,0,0.9), 0 0 50px rgba(51,255,51,0.1);
        white-space: nowrap;
        overflow: hidden;
        /* CRT Screen Curve effect */
        perspective: 1000px;
        transform-style: preserve-3d;
      }

      .output {
        line-height: 1.6;
        text-transform: uppercase;
        text-shadow: 0 0 4px var(--glow), 0 0 8px var(--phosphor-dim);
        /* Slight blur to mimic bleeding phosphor */
        filter: blur(0.4px); 
      }

      .line {
        display: block;
        min-height: 1.5em;
        white-space: pre-wrap; 
        word-wrap: break-word;
      }

      .cursor {
        display: inline-block;
        width: 1ch;
        height: 1em;
        background-color: var(--glow);
        animation: blink 1s step-end infinite;
        vertical-align: middle;
        margin-left: 2px;
        box-shadow: 0 0 5px var(--glow);
      }

      @keyframes blink {
        from, to { opacity: 0; }
        50% { opacity: 1; }
      }

      /* Screen Flicker Animation */
      @keyframes flicker {
        0% { opacity: 0.98; }
        5% { opacity: 0.95; }
        10% { opacity: 0.99; }
        15% { opacity: 0.96; }
        50% { opacity: 0.99; }
        80% { opacity: 0.98; }
        100% { opacity: 1; }
      }

      /* Scanlines */
      .scanlines {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(
          to bottom,
          rgba(255,255,255,0),
          rgba(255,255,255,0) 50%,
          rgba(0,0,0,0.2) 50%,
          rgba(0,0,0,0.2)
        );
        background-size: 100% 4px;
        pointer-events: none;
        z-index: 10;
        animation: flicker 0.15s infinite;
      }

      /* Screen Glare */
      .vignette {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        box-shadow: inset 0 0 150px rgba(0, 0, 0, 0.9);
        background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.03) 0%, transparent 60%);
        pointer-events: none;
        z-index: 11;
        border-radius: 16px;
      }

      .hidden { visibility: hidden; }
      ::selection { background: var(--glow); color: #000; }
    </style>
  </head>
  <body>
    <div class="monitor">
      <div class="terminal-container">
        <div class="scanlines"></div>
        <div class="vignette"></div>
        
        <div id="screen" class="output"></div>
        <div id="input-line" class="output hidden">
          <span>A:\&gt; </span><span id="cmd-input"></span><span class="cursor"></span>
        </div>
      </div>
    </div>

    <script>
      // --- SUPABASE CONFIG ---
      const SUPABASE_URL = 'https://twtdvowgqqxdgfgbfcod.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR3dGR2b3dncXF4ZGdmZ2JmY29kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NTMwNTAsImV4cCI6MjA5MjMyOTA1MH0.wtR9fcc-J6Fpp7dlqfycg3TAQOo4YLPpBXOpvO5QiAs';
      const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const screen = document.getElementById("screen");
      const inputLine = document.getElementById("input-line");
      const inputSpan = document.getElementById("cmd-input");
      let currentInput = "";
      let isBooting = true;
      const commandHistory = [];
      let historyIndex = -1;

      const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

      function printLine(text) {
        const line = document.createElement("span");
        line.className = "line";
        line.innerText = text;
        screen.appendChild(line);
        // Autoscroll to bottom
        screen.parentElement.scrollTop = screen.parentElement.scrollHeight;
        // Keep DOM clean
        if (screen.childNodes.length > 100) screen.removeChild(screen.firstChild);
      }

      async function getRepoSize() {
        try {
          const { data } = await _supabase.from('user_uploads').select('id');
          return data ? (data.length * 512) : "0";
        } catch (e) { return "0"; }
      }

      // ASCII CONVERTER (Intact)
      async function drawAscii(url) {
        return new Promise((resolve) => {
          const img = new Image();
          img.crossOrigin = "Anonymous";
          img.src = url;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const width = 80; // slightly wider for better res
            const height = (img.height / img.width) * width * 0.5;
            canvas.width = width;
            canvas.height = height;
            ctx.drawImage(img, 0, 0, width, height);
            const data = ctx.getImageData(0, 0, width, height).data;
            const chars = "@%#*+=-:. ";
            let ascii = "";
            for (let i = 0; i < data.length; i += 4) {
              const lum = (data[i] * 0.2126 + data[i+1] * 0.7152 + data[i+2] * 0.0722);
              ascii += chars[Math.floor((lum / 255) * (chars.length - 1))];
              if ((i / 4 + 1) % width === 0) ascii += "\n";
            }
            resolve(ascii);
          };
          img.onerror = () => resolve("ERR: RENDER_FAIL");
        });
      }

      async function runBootSequence() {
        inputLine.style.visibility = "hidden";
        isBooting = true;
        screen.innerHTML = "";

        printLine("AMI(MINNIE)BIOS (C) 2026 CHIPFLARE INC.");
        printLine("BIOS Date 06/14/26 10:08:33 Ver 1.00");
        printLine("CPU : Intel(R) 80386 CPU at 33 MHz");
        printLine("------------------------------------------------");
        await wait(600);

        printLine("Performing POST checks...");
        await wait(300);
        
        let mem = 0;
        const memLine = document.createElement("span");
        memLine.className = "line";
        screen.appendChild(memLine);
        
        for (let i = 0; i <= 1024; i += 64) {
          memLine.innerText = `Base Memory Size : ${i} KB OK`;
          await wait(25);
        }
        await wait(200);

        printLine("CMOS Battery State : OK");
        printLine("Keyboard......... : Detected");
        printLine("Mouse............ : Not Present");
        await wait(500);

        printLine("Initializing IO_BUS: ACTIVE");
        await wait(400);

        printLine("Waiting for Network interface...");
        await wait(800);
        printLine("DHCP... OK (IP Assigned)");

        printLine("Mounting DRIVE_C Metadata...");
        const repoSize = await getRepoSize();
        await wait(400);
        printLine(`ALLOCATED: ${repoSize}KB [SUPABASE_V8_FS]`);
        await wait(300);

        printLine("------------------------------------------------");
        printLine("System Boot Complete.");
        printLine("");
        printLine("Type 'HELP' for a list of available commands.");

        inputLine.style.visibility = "visible";
        inputLine.classList.remove("hidden");
        isBooting = false;
      }

      // Supabase logic (Intact)
      async function listFiles() {
        printLine(" Volume in drive C has no label.");
        printLine(" Directory of C:\\UPLOADS\n");
        const { data, error } = await _supabase.from('user_uploads').select('file_name, is_approved, created_at');
        if (error || !data.length) {
          printLine("File not found.");
          return;
        }
        data.forEach(f => {
          const status = f.is_approved ? "<PUB>" : "<REV>";
          const date = new Date(f.created_at || Date.now()).toLocaleDateString();
          printLine(`${date}  ${status}  ${f.file_name}`);
        });
        printLine(`\n       ${data.length} File(s)`);
      }

      async function uploadFile() {
        const fileInput = document.createElement('input');
        fileInput.type = 'file';
        fileInput.accept = 'image/*,text/plain';

        fileInput.onchange = async (e) => {
          const file = e.target.files[0];
          if (!file) return;

          const customName = prompt("SET REMOTE FILENAME (NO SPACES):", file.name.replace(/\s+/g, '_'));
          if(!customName) return printLine("ABORTED.");

          printLine(`UPLOADING SECTORS: ${customName}...`);
          
          try {
            const ipRes = await fetch('https://api.ipify.org?format=json');
            const { ip } = await ipRes.json();
            const fileName = `${Date.now()}_${customName}`;

            const { error: storeErr } = await _supabase.storage
              .from('gallery')
              .upload(fileName, file);

            if (storeErr) throw storeErr;

            await _supabase.from('user_uploads').insert({
              file_name: fileName,
              uploader_ip: ip,
              is_approved: false
            });

            printLine("1 file(s) copied.");
          } catch (err) {
            printLine(`Write fault error writing device C:`);
          }
        };
        fileInput.click();
      }

      async function readFile(name, isView) {
        if (!name) return printLine("Required parameter missing");
        printLine(`Loading ${name}...`);

        const { data: urlData } = _supabase.storage.from('gallery').getPublicUrl(name);
        
        if (isView) {
          printLine("Initializing graphics mode...");
          const art = await drawAscii(urlData.publicUrl);
          art.split('\n').forEach(l => printLine(l));
        } else {
           try {
            const res = await fetch(urlData.publicUrl);
            const txt = await res.text();
            printLine("\n" + txt.substring(0, 500) + (txt.length > 500 ? "\n...[TRUNCATED]" : ""));
          } catch (e) { printLine("Read fault error"); }
        }
      }

      async function processCommand(cmd) {
        const parts = cmd.trim().split(/\s+/);
        const action = parts[0].toLowerCase();
        const args = parts.slice(1).join(" ");

        printLine(`A:\\> ${cmd}`);

        switch (action) {
          case "help":
            printLine("Available commands:");
            printLine("  DIR        Displays a list of files and subdirectories.");
            printLine("  COPY       Copies a file to the remote server.");
            printLine("  VIEW       [filename] Renders image data as ASCII.");
            printLine("  TYPE       [filename] Displays the contents of a text file.");
            printLine("  CLS        Clears the screen.");
            printLine("  DATE       Displays the current system date.");
            printLine("  TIME       Displays the current system time.");
            printLine("  VER        Displays the AMIBIOS version.");
            printLine("  REBOOT     Restarts the system.");
            break;
          case "dir":
          case "ls":
            await listFiles();
            break;
          case "copy":
          case "upload":
            await uploadFile();
            break;
          case "view":
            await readFile(args, true);
            break;
          case "type":
          case "print":
          case "cat":
            await readFile(args, false);
            break;
          case "status":
            printLine("Network Adapter : Connected");
            printLine("Protocol        : TCP/IP");
            printLine("Subsystem       : Active");
            break;
          case "cls":
          case "clear":
            screen.innerHTML = "";
            break;
          case "reboot":
            runBootSequence();
            break;
          case "date":
            printLine(`Current date is ${new Date().toLocaleDateString()}`);
            break;
          case "time":
            printLine(`Current time is ${new Date().toLocaleTimeString()}`);
            break;
          case "ver":
            printLine("AMIBIOS Community Edition Version 1.0.0");
            break;
          case "":
            break;
          default:
            printLine(`Bad command or file name`);
        }
      }

      window.addEventListener("keydown", (e) => {
        if (isBooting) return;
        
        // Prevent default scrolling when hitting space
        if (e.key === " ") e.preventDefault();

        if (e.key === "Backspace") {
          currentInput = currentInput.slice(0, -1);
        } else if (e.key === "Enter") {
          if (currentInput.length > 0) {
            commandHistory.push(currentInput);
            historyIndex = commandHistory.length;
            processCommand(currentInput);
            currentInput = "";
          } else {
            printLine("A:\\>");
          }
        } else if (e.key === "ArrowUp") {
          if (historyIndex > 0) {
            historyIndex--;
            currentInput = commandHistory[historyIndex];
          }
        } else if (e.key === "ArrowDown") {
          if (historyIndex < commandHistory.length - 1) {
            historyIndex++;
            currentInput = commandHistory[historyIndex];
          } else {
            historyIndex = commandHistory.length;
            currentInput = "";
          }
        } else if (e.key.length === 1) {
          currentInput += e.key;
        }
        
        inputSpan.innerText = currentInput;
        // Keep view anchored to bottom while typing
        screen.parentElement.scrollTop = screen.parentElement.scrollHeight;
      });

      // Start
      runBootSequence();
    </script>
  </body>
</html>
