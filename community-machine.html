<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AMIBIOS comunity machine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Sixtyfour&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      :root {
        --glow: #33ff33;
        --bg: #050505;
      }

      * {
        -webkit-font-smoothing: none;
        -moz-osx-font-smoothing: grayscale;
        font-smoothing: none;
        box-sizing: border-box;
      }

      body,
      html {
        background-color: #000;
        color: var(--glow);
        font-family: 'Sixtyfour', sans-serif;
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }

      .terminal-container {
        font-size: clamp(6px, 2vw, 15px);
        width: 85ch;
        height: 85vh;
        max-width: 95vw;
        position: relative;
        padding: 3ch;
        background: var(--bg);
        border: 1px solid #111;
        box-shadow: 0 0 50px rgba(0, 0, 0, 1);
        white-space: nowrap;
      }

      .output {
        line-height: 1.5;
        text-transform: uppercase;
        text-shadow: 0 0 5px rgba(51, 255, 51, 0.8);
        filter: blur(0.2px);
      }

      .line {
        display: block;
        min-height: 1.5em;
        white-space: pre; /* Added for ASCII support */
      }

      .cursor {
        display: inline-block;
        width: 1ch;
        height: 1em;
        background-color: var(--glow);
        animation: blink 1s step-end infinite;
        vertical-align: middle;
        margin-left: 2px;
      }

      @keyframes blink {
        from, to { opacity: 0; }
        50% { opacity: 1; }
      }

      .vignette {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        box-shadow: inset 0 0 300px rgba(0, 0, 0, 1);
        pointer-events: none;
        z-index: 5;
      }

      .hidden { visibility: hidden; }

      ::selection { background: var(--glow); color: #000; }
    </style>
  </head>
  <body>
    <div class="vignette"></div>

    <div class="terminal-container">
      <div id="screen" class="output"></div>
      <div id="input-line" class="output hidden">
        <span>&gt; </span><span id="cmd-input"></span><span class="cursor"></span>
      </div>
    </div>

    <script>
      // --- SUPABASE CONFIG ---
      const SUPABASE_URL = 'https://twtdvowgqqxdgfgbfcod.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR3dGR2b3dncXF4ZGdmZ2JmY29kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NTMwNTAsImV4cCI6MjA5MjMyOTA1MH0.wtR9fcc-J6Fpp7dlqfycg3TAQOo4YLPpBXOpvO5QiAs';
      const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const screen = document.getElementById("screen");
      const inputLine = document.getElementById("input-line");
      const inputSpan = document.getElementById("cmd-input");
      let currentInput = "";
      let isBooting = true;

      const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

      function printLine(text) {
        const line = document.createElement("span");
        line.className = "line";
        line.innerText = text;
        screen.appendChild(line);
        if (screen.childNodes.length > 50) screen.removeChild(screen.firstChild);
      }

      async function getRepoSize() {
        try {
          const { data } = await _supabase.from('user_uploads').select('id');
          return data ? (data.length * 512) : "0";
        } catch (e) { return "0"; }
      }

      // --- NEW ASCII CONVERTER ---
      async function drawAscii(url) {
        return new Promise((resolve) => {
          const img = new Image();
          img.crossOrigin = "Anonymous";
          img.src = url;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const width = 60; 
            const height = (img.height / img.width) * width * 0.5;
            canvas.width = width;
            canvas.height = height;
            ctx.drawImage(img, 0, 0, width, height);
            const data = ctx.getImageData(0, 0, width, height).data;
            const chars = "@%#*+=-:. ";
            let ascii = "";
            for (let i = 0; i < data.length; i += 4) {
              const lum = (data[i] * 0.2126 + data[i+1] * 0.7152 + data[i+2] * 0.0722);
              ascii += chars[Math.floor((lum / 255) * (chars.length - 1))];
              if ((i / 4 + 1) % width === 0) ascii += "\n";
            }
            resolve(ascii);
          };
          img.onerror = () => resolve("ERR: RENDER_FAIL");
        });
      }

      async function runBootSequence() {
        inputLine.style.visibility = "hidden";
        isBooting = true;
        screen.innerHTML = "";

        printLine("AMI(MINNIE)BIOS (C) 2026 CHIPFLARE INC.");
        printLine("------------------------------------------------");
        await wait(500);

        printLine("MEMORY CHECK...");
        for (let i = 0; i <= 640; i += 64) {
          screen.lastChild.innerText = `MEMORY CHECK: ${i}KB OK`;
          await wait(20);
        }
        await wait(400);

        printLine("IO_BUS: ACTIVE");
        await wait(600);

        printLine("RETRIEVING DRIVE_C METADATA...");
        const repoSize = await getRepoSize();
        await wait(800);
        printLine(`ALLOCATED: ${repoSize}KB [SUPABASE_V8]`);
        await wait(400);

        printLine("------------------------------------------------");
        printLine("LOADING CORE_FRAGMENTS...");

        const fragments = ["0426", "AE_542", "UNKNOWN"];
        for (const f of fragments) {
          await wait(400);
          printLine(`LINKING ${f}...`);
        }

        await wait(600);
        printLine(" ");
        printLine("READY.");

        inputLine.style.visibility = "visible";
        inputLine.classList.remove("hidden");
        isBooting = false;
      }

      async function listFiles() {
        printLine("SCANNING DIRECTORY...");
        const { data, error } = await _supabase.from('user_uploads').select('file_name, is_approved');
        if (error || !data.length) {
          printLine("NO RECORDS FOUND.");
          return;
        }
        data.forEach(f => {
          const status = f.is_approved ? "[PUB]" : "[REV]";
          printLine(`${status} ${f.file_name}`);
        });
      }

      async function uploadFile() {
        const fileInput = document.createElement('input');
        fileInput.type = 'file';
        fileInput.accept = 'image/*,text/plain';

        fileInput.onchange = async (e) => {
          const file = e.target.files[0];
          if (!file) return;

          // ASK FOR FILENAME
          const customName = prompt("SET REMOTE FILENAME:", file.name);
          if(!customName) return printLine("ABORTED.");

          printLine(`WRITING: ${customName}...`);
          
          try {
            const ipRes = await fetch('https://api.ipify.org?format=json');
            const { ip } = await ipRes.json();
            const fileName = `${Date.now()}_${customName}`;

            const { error: storeErr } = await _supabase.storage
              .from('gallery')
              .upload(fileName, file);

            if (storeErr) throw storeErr;

            await _supabase.from('user_uploads').insert({
              file_name: fileName,
              uploader_ip: ip,
              is_approved: false
            });

            printLine("SUCCESS: DATA COMMITTED.");
          } catch (err) {
            printLine(`ERR: WRITE_FAILED`);
          }
        };
        fileInput.click();
      }

      async function readFile(name, isView) {
        if (!name) return printLine("ERR: NAME_REQ");
        printLine(`READING ${name}...`);

        const { data: urlData } = _supabase.storage.from('gallery').getPublicUrl(name);
        
        if (isView) {
          printLine("RENDER_MODE: ASCII");
          const art = await drawAscii(urlData.publicUrl);
          art.split('\n').forEach(l => printLine(l));
        } else {
           try {
            const res = await fetch(urlData.publicUrl);
            const txt = await res.text();
            printLine(">> CONTENT:");
            printLine(txt.substring(0, 100));
          } catch (e) { printLine("ERR: STREAM_FAIL"); }
        }
      }

      async function processCommand(cmd) {
        const parts = cmd.trim().split(" ");
        const action = parts[0].toLowerCase();
        const args = parts.slice(1).join(" ");

        printLine(`> ${cmd}`);

        switch (action) {
          case "help":
            printLine("HELP--------------COMMAND LIST");
            printLine("DIR---------------DIRECTORY VIEW");
            printLine("COPY--------------UPLOAD FILE");
            printLine("VIEW [FILE]-------ASCII RENDER");
            printLine("PRINT [FILE]------TEXT CONTENT");
            printLine("CLEAR-------------CLEAR SCREEN");
            printLine("STATUS------------SYSTEM STATUS");
            printLine("REBOOT------------REBOOT SYSTEM");
            break;
          case "dir":
            await listFiles();
            break;
          case "copy":
            await uploadFile();
            break;
          case "view":
            await readFile(args, true);
            break;
          case "print":
            await readFile(args, false);
            break;
          case "status":
            printLine("NET: CONNECTED");
            printLine("LOC: SRI LANKA // WESTERN");
            break;
          case "clear":
            screen.innerHTML = "";
            break;
          case "reboot":
            runBootSequence();
            break;
          default:
            printLine("ERR: INVALID_COMMAND");
        }
      }

      window.addEventListener("keydown", (e) => {
        if (isBooting) return;
        if (e.key === "Backspace") {
          currentInput = currentInput.slice(0, -1);
        } else if (e.key === "Enter") {
          if (currentInput.length > 0) {
            processCommand(currentInput);
            currentInput = "";
          }
        } else if (e.key.length === 1) {
          currentInput += e.key;
        }
        inputSpan.innerText = currentInput;
      });

      runBootSequence();
    </script>
  </body>
</html>
