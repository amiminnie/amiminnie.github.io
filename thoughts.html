<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>amiminnie - thoughts</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#111111" />
    <link id="theme-style" rel="stylesheet" href="light.css" />
    <link id="style" rel="stylesheet" href="style.css" />
    <link rel="icon" href="images/favicon.ico" />

    <script src="common.js" type="module"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Overlock:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap"
      rel="stylesheet" />
  </head>

  <body>
    <div class="container">
      <header>
        <nav>
          <a href="index.html">about</a>
          <a href="gallery.html">gallery</a>
          <a href="" class="active">thoughts</a>
          <button id="theme-toggle" class="theme-btn" title="Dark mode extensions may interfere with this!">
            <img id="theme-icon" src="images/moon-icon.png" alt="Toggle theme" />
          </button>
        </nav>
      </header>

      <main>
        <section class="intro">
          <p class="prefix">some midnight</p>
          <h1>thoughts</h1>
          <p class="subtitle">may get a little deep</p>
        </section>

        <section class="thoughts">
          <ul id="thoughts-list" class="thoughts-list">
            <li>loading...</li>
          </ul>
        </section>
      </main>

      <footer>
        <p>amiminnie</p>
      </footer>
    </div>

    <!-- Theme Script (unchanged) -->
    <script>
      const themeLink = document.getElementById("theme-style");
      const toggleBtn = document.getElementById("theme-toggle");
      const themeIcon = document.getElementById("theme-icon");

      // Get the preference from the user's browser memory
      const savedTheme = localStorage.getItem("theme");

      function setTheme(mode) {
        if (mode === "dark") {
          themeLink.href = "dark.css";
          document.documentElement.style.colorScheme = "dark";
          themeIcon.src = "images/sun-icon.png";
          themeIcon.alt = "light mode";
          localStorage.setItem("theme", "dark");
        } else {
          themeLink.href = "light.css";
          document.documentElement.style.colorScheme = "light";
          themeIcon.src = "images/moon-icon.png";
          themeIcon.alt = "dark mode";
          localStorage.setItem("theme", "light");
        }
      }

      // If the user has a saved preference, use it.
      // If they are a new visitor, force the dark theme.
      if (savedTheme) {
        setTheme(savedTheme);
      } else {
        setTheme("dark");
      }

      // Handle the click event for the theme switcher button
      toggleBtn.addEventListener("click", () => {
        themeIcon.style.transform = "scale(0)";
        setTimeout(() => {
          const current = localStorage.getItem("theme");
          setTheme(current === "dark" ? "light" : "dark");
          void themeIcon.offsetWidth;
          themeIcon.style.transform = "scale(1)";
        }, 120);
      });
    </script>

    <!-- Thoughts Loader -->
    <script>
      async function loadThoughts() {
        const list = document.getElementById("thoughts-list");

        try {
          const res = await fetch("thoughts.json");
          if (!res.ok) throw new Error("Failed to fetch thoughts.json");

          const items = await res.json();
          list.innerHTML = "";

          items.forEach((item) => {
            const div = document.createElement("div");
            div.className = "thought-item";

            div.innerHTML = `
        <a class="thought-link" href="read.html#${item.tag}">
            <h3 class="gallery-title">${item.title}</h3>
            <p class="gallery-description"><i>${item.description}</i></p>
            <p class="gallery-date"><em>${item.date}</em></p>
        </a>
      `;

            list.appendChild(div);
          });
        } catch (err) {
          list.innerHTML = `<li>Could not load thoughts.</li>`;
          console.error(err);
        }
      }

      loadThoughts();
    </script>
  </body>
</html>
