<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>amiminnie - articles</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#111111" />
    <link id="theme-style" rel="stylesheet" href="light.css" />
    <link id="style" rel="stylesheet" href="style.css" />
    <link rel="icon" href="images/favicon.ico" />

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Overlock:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap"
      rel="stylesheet" />

    <style>
      @keyframes printFadeIn {
        from {
          opacity: 0;
          transform: translateY(5px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .thought-content > * {
        opacity: 0;
        animation: printFadeIn 0.5s ease-out forwards;
      }

      .thought-content > *:nth-child(1) { animation-delay: 0.05s; }
      .thought-content > *:nth-child(2) { animation-delay: 0.20s; }
      .thought-content > *:nth-child(3) { animation-delay: 0.35s; }
      .thought-content > *:nth-child(4) { animation-delay: 0.50s; }
      .thought-content > *:nth-child(n+5) { animation-delay: 0.65s; }
    </style>
  </head>

  <body>
    <div class="container">
      <header>
        <nav>
          <a href="index.html">about</a>
          <a href="gallery.html">gallery</a>
          <a href="articles.html">articles</a>
          <button id="theme-toggle" class="theme-btn" title="Dark mode extensions may interfere with this!">
            <img id="theme-icon" src="images/moon-icon.png" alt="Toggle theme" />
          </button>
        </nav>
      </header>

      <main>
        <article id="thought-content" class="thought-content">
        </article>
      </main>

      <section class="social-list" style="border: none">
        <a class="social-item" href="index.html#guestbook">
          <img src="images/comment.png" alt="gallery" />
          <div class="social-text">
            <h2>leave a comment &gt;&gt;</h2>
            <p>i'd appreceate to read what you have to say about this!</p>
          </div>
        </a>
      </section>

      <footer>
        <p>Supabase Supabase, thank you Supabase</p>
        <p>amiminnie</p>
      </footer>
    </div>

    <script>
      const themeLink = document.getElementById("theme-style");
      const toggleBtn = document.getElementById("theme-toggle");
      const themeIcon = document.getElementById("theme-icon");

      const savedTheme = localStorage.getItem("theme");

      function setTheme(mode) {
        if (mode === "dark") {
          themeLink.href = "dark.css";
          document.documentElement.style.colorScheme = "dark";
          themeIcon.src = "images/sun-icon.png";
          themeIcon.alt = "light mode";
          localStorage.setItem("theme", "dark");
        } else {
          themeLink.href = "light.css";
          document.documentElement.style.colorScheme = "light";
          themeIcon.src = "images/moon-icon.png";
          themeIcon.alt = "dark mode";
          localStorage.setItem("theme", "light");
        }
      }

      if (savedTheme) {
        setTheme(savedTheme);
      } else {
        setTheme("dark");
      }

      toggleBtn.addEventListener("click", () => {
        themeIcon.style.transform = "scale(0)";
        setTimeout(() => {
          const current = localStorage.getItem("theme");
          setTheme(current === "dark" ? "light" : "dark");
          void themeIcon.offsetWidth;
          themeIcon.style.transform = "scale(1)";
        }, 120);
      });
    </script>

    <script>
      const SUB_URL = "https://miwcmqwhudshgetmrmhf.supabase.co";
      const SUB_KEY = "sb_publishable_stheDa15dO1UIajFAVSHmw_hKuIf4GZ";
      const supabaseClient = supabase.createClient(SUB_URL, SUB_KEY);

      async function loadThought() {
        const container = document.getElementById("thought-content");
        const tag = window.location.hash.substring(1);

        if (!tag) {
          container.innerHTML = "<p>i think you dropped the tag</p>";
          return;
        }

        try {
          const { data: post, error } = await supabaseClient
            .from('blogs')
            .select('title, content')
            .eq('tag', tag)
            .single();

          if (error || !post) {
            container.innerHTML = "<p>i havent thought of that yet</p>";
            return;
          }

          container.classList.remove("thought-content");
          container.innerHTML = post.content;
          void container.offsetWidth;
          container.classList.add("thought-content");
          const scripts = container.querySelectorAll("script");
          scripts.forEach((oldScript) => {
            const newScript = document.createElement("script");
            Array.from(oldScript.attributes).forEach((attr) => {
              newScript.setAttribute(attr.name, attr.value);
            });
            newScript.appendChild(document.createTextNode(oldScript.innerHTML));
            oldScript.parentNode.replaceChild(newScript, oldScript);
          });
          document.title = `amiminnie - ${post.title}`;
        } catch (err) {
          container.innerHTML = "<p>i think i got distracted</p>";
          console.error(err);
        }
      }
      window.addEventListener("hashchange", loadThought);
      loadThought();
    </script>
  </body>
</html>
