<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>amiminnie - thoughts</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#111111" />
    <link id="theme-style" rel="stylesheet" href="light.css" />
    <link id="style" rel="stylesheet" href="style.css" />
    <link rel="icon" href="images/favicon.ico" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Overlock:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap"
      rel="stylesheet" />
  </head>

  <body>
    <div class="container">
      <header>
        <nav>
          <a href="index.html">about</a>
          <a href="gallery.html">gallery</a>
          <a href="thoughts.html">thoughts</a>
          <button id="theme-toggle" class="theme-btn" title="Dark mode extensions may interfere with this!">
            <img id="theme-icon" src="images/moon-icon.png" alt="Toggle theme" />
          </button>
        </nav>
      </header>

      <main>
        <article id="thought-content" class="thought-content">
          <p>Loading thought...</p>
        </article>
      </main>

      <section class="social-list" style="border: none">
        <a class="social-item" href="index.html#guestbook">
          <img src="images/comment.png" alt="gallery" />
          <div class="social-text">
            <h2>leave a comment &gt;&gt;</h2>
            <p>i'd appreceate to read what you have to say about this!</p>
          </div>
        </a>
      </section>

      <footer>
        <p>amiminnie</p>
      </footer>
    </div>

    <script>

      const themeLink = document.getElementById("theme-style");
      const toggleBtn = document.getElementById("theme-toggle");
      const themeIcon = document.getElementById("theme-icon");

      // Get the preference from the user's browser memory
      const savedTheme = localStorage.getItem("theme");

      function setTheme(mode) {
        if (mode === "dark") {
          themeLink.href = "dark.css";
          document.documentElement.style.colorScheme = "dark";
          themeIcon.src = "images/sun-icon.png";
          themeIcon.alt = "light mode";
          localStorage.setItem("theme", "dark");
        } else {
          themeLink.href = "light.css";
          document.documentElement.style.colorScheme = "light";
          themeIcon.src = "images/moon-icon.png";
          themeIcon.alt = "dark mode";
          localStorage.setItem("theme", "light");
        }
      }

      // If the user has a saved preference, use it.
      // If they are a new visitor, force the dark theme.
      if (savedTheme) {
        setTheme(savedTheme);
      } else {
        setTheme("dark");
      }

      // Handle the click event for the theme switcher button
      toggleBtn.addEventListener("click", () => {
        themeIcon.style.transform = "scale(0)";
        setTimeout(() => {
          const current = localStorage.getItem("theme");
          setTheme(current === "dark" ? "light" : "dark");
          void themeIcon.offsetWidth;
          themeIcon.style.transform = "scale(1)";
        }, 120);
      });
    </script>

    <script>
      async function loadThought() {
        const container = document.getElementById("thought-content");
        const tag = window.location.hash.substring(1);

        if (!tag) {
          container.innerHTML = "<p>i think you dropped the tag</p>";
          return;
        }

        try {
          const res = await fetch("thoughts.json");
          if (!res.ok) throw new Error("where is it?");

          const items = await res.json();
          const thought = items.find((item) => item.tag === tag);

          if (!thought) {
            container.innerHTML = "<p>i havent thought of that yet</p>";
            return;
          }

          const fileRes = await fetch(`thoughts/${thought.tag}.html`);
          if (!fileRes.ok) throw new Error("where did that thought go?");

          const html = await fileRes.text();

          // Inject the HTML
          container.innerHTML = html;

          // Manually find and execute scripts within the injected HTML
          const scripts = container.querySelectorAll("script");
          scripts.forEach((oldScript) => {
            const newScript = document.createElement("script");

            // Copy all attributes (src, type, etc.)
            Array.from(oldScript.attributes).forEach((attr) => {
              newScript.setAttribute(attr.name, attr.value);
            });

            // Copy the script content
            newScript.appendChild(document.createTextNode(oldScript.innerHTML));

            // Replacing the element triggers execution
            oldScript.parentNode.replaceChild(newScript, oldScript);
          });

          // Update page title dynamically
          document.title = `amiminnie - ${thought.title}`;
        } catch (err) {
          container.innerHTML = "<p>i think i got distracted</p>";
          console.error(err);
        }
      }

      // Listen for hash changes so the page updates without refreshing
      window.addEventListener("hashchange", loadThought);
      loadThought();
    </script>
  </body>
</html>
