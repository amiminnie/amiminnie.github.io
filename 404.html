<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>amiminnie</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="color-scheme" content="light dark" />
        <meta name="theme-color" content="#111111" />

        <meta property="og:title" content="amiminnie" />
        <meta property="og:description" content="my silly little site" />
        <meta property="og:type" content="website" />
        <meta property="og:image" content="https://amiminnie.github.io/images/heart.png" />
        <meta property="og:url" content="https://amiminnie.github.io" />

        <meta name="twitter:card" content="summary" />
        <meta name="twitter:image" content="https://amiminnie.github.io/images/heart.png" />

        <link id="theme-style" rel="stylesheet" href="light.css" />
        <link id="style" rel="stylesheet" href="style.css" />

        <link rel="icon" href="images/favicon.ico" />
        <link rel="apple-touch-icon" href="images/heart.png" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Overlock:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap" rel="stylesheet" />

        <style>
            /* --- Nonogram Styles --- */
            .nonogram-container {
                display: flex;
                flex-direction: column;
                align-items: center;
                margin: 10px auto;
                font-family: 'Overlock', sans-serif;
                user-select: none;
                max-width: 100%;
            }

            .nonogram-wrapper {
                display: grid;
                grid-template-columns: auto 1fr;
                background-color: #0000;
            }

            .col-hints {
                grid-column: 2;
                grid-row: 1;
                display: grid;
                grid-template-columns: repeat(10, 30px);
                gap: 1px;
                align-items: end;
            }

            .hint-col {
                display: flex;
                flex-direction: column;
                justify-content: flex-end;
                align-items: center;
                font-size: 11px;
                padding-bottom: 5px;
                padding-top: 20px;
                line-height: 1.2;
                box-sizing: border-box;
                background-color: transparent;
                transition: background-color 0.2s, font-weight 0.2s;
            }

            .row-hints {
                grid-column: 1;
                grid-row: 2;
                display: grid;
                grid-template-rows: repeat(10, 30px);
                gap: 1px;
                align-items: center;
                padding-right: 8px;
            }

            .hint-row {
                display: flex;
                justify-content: flex-end;
                align-items: center;
                gap: 10px;
                font-size: 11px;
                white-space: nowrap;
                height: 30px;
                padding-right: 10px;
                padding-left: 20px;
                box-sizing: border-box;
                margin-right: 0;
                background-color: transparent;
                transform: translateX(7px)
            }

            /* Switches color only when the line is correct */
            .hint-row.completed {
                background: linear-gradient(-90deg, var(--bubble), #0000); 
            }
            .hint-col.completed {
                background: linear-gradient(0deg, var(--bubble), #0000); 
            }

            .grid {
                grid-column: 2;
                grid-row: 2;
                display: grid;
                grid-template-columns: repeat(10, 30px);
                grid-template-rows: repeat(10, 30px);
                gap: 1px;
                background-color: transparent; 
                border: none;
            }

            .cell {
                background-color: var(--card-hover);
                cursor: pointer;
                position: relative;
                box-sizing: border-box;
                border-bottom: solid 4px #0001;
                transition: transform 0.1s ease, background-color 0.2s ease;
            }

            :root {
                --cell-crossed: #ccc;
            }
            html[style*="color-scheme: dark"] {
                --cell-crossed: #444;
            }

            .cell.filled {
                background-color: var(--accent, #ff4a5a);
                border-bottom: solid 2px #0002;
                transform:  translateY(1px);
            }

            .cell.crossed::before, .cell.crossed::after {
                content: '';
                position: absolute;
                width: 60%;
                height: 2px;
                background-color: #999;
                top: 50%;
                left: 20%;
            }
            .cell.crossed::before { transform: rotate(45deg); }
            .cell.crossed::after { transform: rotate(-45deg); }

            #win-message {
                margin-top: 15px;
                color: var(--accent-hover);
                font-weight: bold;
                visibility: hidden;
            }
        </style>
    </head>

    <body>
        <div class="container">
            <header>
                <nav>
                    <a href="index.html">about</a>
                    <a href="gallery.html">gallery</a>
                    <a href="articles.html">articles</a>
                    <button id="theme-toggle" class="theme-btn" title="Dark mode extensions may interfere with this!">
                        <img id="theme-icon" src="images/moon-icon.png" alt="Toggle theme" />
                    </button>
                </nav>
            </header>

            <main>
                <section class="intro">
                    <p class="prefix">where am i?</p>
                    <h1 style="color: var(--text-main)">404: resource not found</h1>

                    <div class="bio">
                        <a href="index.html">go back home</a>
                    </div>
                    <p class="subtitle">or play this little game!</p>
                </section>
            </main>

            <div class="nonogram-container">
                <div class="nonogram-wrapper">
                    <div class="corner"></div>
                    <div id="col-hints" class="col-hints"></div>
                    <div id="row-hints" class="row-hints"></div>
                    <div id="grid" class="grid"></div>
                </div>
                <p style="font-size: 12px; opacity: 0.6; margin-top: 10px; margin-bottom: 5px;">Left-click to draw | Right-click to cross</p>
                <div id="win-message">Thanks for playing my little nonogram!</div>
            </div>

            <footer>
                <p>amiminnie</p>
            </footer>
        </div>

        <script>
            /* --- Theme Switcher Logic --- */
            const themeLink = document.getElementById("theme-style");
            const toggleBtn = document.getElementById("theme-toggle");
            const themeIcon = document.getElementById("theme-icon");
            const savedTheme = localStorage.getItem("theme");

            function setTheme(mode) {
                if (mode === "dark") {
                    themeLink.href = "dark.css";
                    document.documentElement.style.colorScheme = "dark";
                    themeIcon.src = "images/sun-icon.png";
                    themeIcon.alt = "light mode";
                    localStorage.setItem("theme", "dark");
                } else {
                    themeLink.href = "light.css";
                    document.documentElement.style.colorScheme = "light";
                    themeIcon.src = "images/moon-icon.png";
                    themeIcon.alt = "dark mode";
                    localStorage.setItem("theme", "light");
                }
            }

            if (savedTheme) {
                setTheme(savedTheme);
            } else {
                setTheme("dark");
            }

            toggleBtn.addEventListener("click", () => {
                themeIcon.style.transform = "scale(0)";
                setTimeout(() => {
                    const current = localStorage.getItem("theme");
                    setTheme(current === "dark" ? "light" : "dark");
                    void themeIcon.offsetWidth;
                    themeIcon.style.transform = "scale(1)";
                }, 120);
            });
            
            /* --- Dynamic Atlas Nonogram Logic --- */
            let solution = []; // Extracted dynamically from atlas image matrix
            let currentMode = 'fill'; 
            let isDrawing = false;
            let drawType = null; 
            const userGrid = Array(10).fill(null).map(() => Array(10).fill(0));

            // Setup image loading pipeline
            const atlasImage = new Image();
            atlasImage.src = 'games/nonograms.png';

            atlasImage.onload = function() {
                // Initialize off-screen virtual canvas to process pixel data
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = atlasImage.width;
                canvas.height = atlasImage.height;
                ctx.drawImage(atlasImage, 0, 0);

                const puzzles = [];
                const puzzleSize = 10; // Splitting 100x100 atlas into 10x10 micro puzzles
                const colsInAtlas = atlasImage.width / puzzleSize;
                const rowsInAtlas = atlasImage.height / puzzleSize;

                // Parse image matrix segments into layout matrices
                for (let py = 0; py < rowsInAtlas; py++) {
                    for (let px = 0; px < colsInAtlas; px++) {
                        const gridMatrix = [];
                        const imgData = ctx.getImageData(px * puzzleSize, py * puzzleSize, puzzleSize, puzzleSize).data;
                        
                        for (let r = 0; r < puzzleSize; r++) {
                            const row = [];
                            for (let c = 0; c < puzzleSize; c++) {
                                const index = (r * puzzleSize + c) * 4;
                                const rValue = imgData[index];
                                const gValue = imgData[index + 1];
                                const bValue = imgData[index + 2];
                                const alpha = imgData[index + 3];

                                // True (1) if pixel is mostly opaque and not pure white
                                const isFilled = (alpha > 50 && !(rValue > 220 && gValue > 220 && bValue > 220));
                                row.push(isFilled ? 0 :1 );
                            }
                            gridMatrix.push(row);
                        }
                        puzzles.push(gridMatrix);
                    }
                }

                // Choose a puzzle index from 0 to 99.
                // Swap the assignment below with the commented line to make it random on load!
                // const selectedPuzzleIndex = 0;
                const selectedPuzzleIndex = Math.floor(Math.random() * puzzles.length);
                
                solution = puzzles[selectedPuzzleIndex];

                // Fire up game compilation once matrix array is ready
                setupGame();
            };

            function generateHints() {
                const rowHints = [];
                for(let r=0; r<10; r++) {
                    let hints = [], count = 0;
                    for(let c=0; c<10; c++) {
                        if(solution[r][c] === 1) count++;
                        else if(count > 0) { hints.push(count); count = 0; }
                    }
                    if(count > 0) hints.push(count);
                    rowHints.push(hints.length ? hints : [0]);
                }

                const colHints = [];
                for(let c=0; c<10; c++) {
                    let hints = [], count = 0;
                    for(let r=0; r<10; r++) {
                        if(solution[r][c] === 1) count++;
                        else if(count > 0) { hints.push(count); count = 0; }
                    }
                    if(count > 0) hints.push(count);
                    colHints.push(hints.length ? hints : [0]);
                }
                return { rowHints, colHints };
            }

            function setupGame() {
                const { rowHints, colHints } = generateHints();
                const gridEl = document.getElementById('grid');
                const rowEl = document.getElementById('row-hints');
                const colEl = document.getElementById('col-hints');

                // Sanitize elements
                gridEl.innerHTML = '';
                rowEl.innerHTML = '';
                colEl.innerHTML = '';

                rowHints.forEach((hints, index) => {
                    const div = document.createElement('div');
                    div.className = 'hint-row';
                    div.id = `hint-row-${index}`;
                    div.innerHTML = hints.map(h => `<span>${h}</span>`).join('');
                    rowEl.appendChild(div);
                });

                colHints.forEach((hints, index) => {
                    const div = document.createElement('div');
                    div.className = 'hint-col';
                    div.id = `hint-col-${index}`;
                    div.innerHTML = hints.map(h => `<span>${h}</span>`).join('');
                    colEl.appendChild(div);
                });

                for (let r = 0; r < 10; r++) {
                    for (let c = 0; c < 10; c++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        cell.dataset.row = r;
                        cell.dataset.col = c;

                        cell.addEventListener('contextmenu', e => e.preventDefault());

                        cell.addEventListener('mousedown', (e) => {
                            e.preventDefault();
                            isDrawing = true;
                            currentMode = (e.button === 2) ? 'cross' : 'fill';
                            handleCellAction(cell, r, c);
                        });

                        cell.addEventListener('mouseenter', () => {
                            if (isDrawing) handleCellAction(cell, r, c);
                        });

                        gridEl.appendChild(cell);
                    }
                }

                window.addEventListener('mouseup', () => {
                    if (isDrawing) {
                        isDrawing = false;
                        drawType = null;
                        checkLineStatus();
                    }
                });
            }

            function handleCellAction(cell, r, c) {
                if (currentMode === 'fill') {
                    if (drawType === null) drawType = cell.classList.contains('filled') ? 'clear' : 'fill';
                    if (drawType === 'fill') {
                        cell.classList.remove('crossed');
                        cell.classList.add('filled');
                        userGrid[r][c] = 1;
                    } else {
                        cell.classList.remove('filled');
                        userGrid[r][c] = 0;
                    }
                } else if (currentMode === 'cross') {
                    if (drawType === null) drawType = cell.classList.contains('crossed') ? 'clear' : 'cross';
                    if (drawType === 'cross') {
                        cell.classList.remove('filled');
                        cell.classList.add('crossed');
                        userGrid[r][c] = 0;
                    } else {
                        cell.classList.remove('crossed');
                    }
                }
            }

            function checkLineStatus() {
                let puzzleSolved = true;

                // Validate Rows
                for (let r = 0; r < 10; r++) {
                    let rowCorrect = true;
                    for (let c = 0; c < 10; c++) {
                        if (solution[r][c] !== userGrid[r][c]) {
                            rowCorrect = false;
                            puzzleSolved = false;
                            break;
                        }
                    }
                    const rowHintEl = document.getElementById(`hint-row-${r}`);
                    if (rowHintEl) {
                        if (rowCorrect) rowHintEl.classList.add('completed');
                        else rowHintEl.classList.remove('completed');
                    }
                }

                // Validate Columns
                for (let c = 0; c < 10; c++) {
                    let colCorrect = true;
                    for (let r = 0; r < 10; r++) {
                        if (solution[r][c] !== userGrid[r][c]) {
                            colCorrect = false;
                            puzzleSolved = false;
                            break;
                        }
                    }
                    const colHintEl = document.getElementById(`hint-col-${c}`);
                    if (colHintEl) {
                        if (colCorrect) colHintEl.classList.add('completed');
                        else colHintEl.classList.remove('completed');
                    }
                }

                if (puzzleSolved) {
                    document.getElementById('win-message').style.visibility = 'visible';
                }
            }

            // Safe optional bindings if resetting functions are expanded in the future
            document.getElementById('mode-fill')?.addEventListener('click', () => currentMode = 'fill');
            document.getElementById('mode-cross')?.addEventListener('click', () => currentMode = 'cross');
            document.getElementById('reset-btn')?.addEventListener('click', () => {
                document.querySelectorAll('.cell').forEach(cell => cell.className = 'cell');
                for(let r=0; r<10; r++) userGrid[r].fill(0);
                document.querySelectorAll('.hint-row, .hint-col').forEach(el => el.classList.remove('completed'));
                document.getElementById('win-message').style.visibility = 'hidden';
            });
        </script>
    </body>
</html>
