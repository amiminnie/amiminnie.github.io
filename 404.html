    <body>

            <main>

            <div class="nonogram-container">
                <div class="nonogram-wrapper">
                    <div class="corner"></div>
                    <div id="col-hints" class="col-hints"></div>
                    <div id="row-hints" class="row-hints"></div>
                    <div id="grid" class="grid"></div>
                </div>
                <p style="font-size: 12px; opacity: 0.6; margin-top: 10px; margin-bottom: 5px">placeholder for now</p>
                <div id="win-message">Thanks for playing!</div>
            </div>

            <footer>
                <p>amiminnie</p>
            </footer>
        </div>

        <script>
            let solution = [];
            let currentMode = "fill";
            let isDrawing = false;
            let drawType = null;
            const userGrid = Array(10)
                .fill(null)
                .map(() => Array(10).fill(0));

            const atlasImage = new Image();
            atlasImage.src = "/assets/games/nonograms.png";

            atlasImage.onload = function () {
                const canvas = document.createElement("canvas");
                const ctx = canvas.getContext("2d");
                canvas.width = atlasImage.width;
                canvas.height = atlasImage.height;
                ctx.drawImage(atlasImage, 0, 0);

                const puzzles = [];
                const puzzleSize = 10;
                const colsInAtlas = atlasImage.width / puzzleSize;
                const rowsInAtlas = atlasImage.height / puzzleSize;

                for (let py = 0; py < rowsInAtlas; py++) {
                    for (let px = 0; px < colsInAtlas; px++) {
                        const gridMatrix = [];
                        const imgData = ctx.getImageData(px * puzzleSize, py * puzzleSize, puzzleSize, puzzleSize).data;

                        for (let r = 0; r < puzzleSize; r++) {
                            const row = [];
                            for (let c = 0; c < puzzleSize; c++) {
                                const index = (r * puzzleSize + c) * 4;
                                const rValue = imgData[index];
                                const gValue = imgData[index + 1];
                                const bValue = imgData[index + 2];
                                const alpha = imgData[index + 3];
                                const isFilled = alpha > 50 && !(rValue > 220 && gValue > 220 && bValue > 220);
                                row.push(isFilled ? 0 : 1);
                            }
                            gridMatrix.push(row);
                        }
                        puzzles.push(gridMatrix);
                    }
                }
                const selectedPuzzleIndex = Math.floor(Math.random() * puzzles.length);

                solution = puzzles[selectedPuzzleIndex];
                setupGame();
            };

            function generateHints() {
                const rowHints = [];
                for (let r = 0; r < 10; r++) {
                    let hints = [],
                        count = 0;
                    for (let c = 0; c < 10; c++) {
                        if (solution[r][c] === 1) count++;
                        else if (count > 0) {
                            hints.push(count);
                            count = 0;
                        }
                    }
                    if (count > 0) hints.push(count);
                    rowHints.push(hints.length ? hints : [0]);
                }

                const colHints = [];
                for (let c = 0; c < 10; c++) {
                    let hints = [],
                        count = 0;
                    for (let r = 0; r < 10; r++) {
                        if (solution[r][c] === 1) count++;
                        else if (count > 0) {
                            hints.push(count);
                            count = 0;
                        }
                    }
                    if (count > 0) hints.push(count);
                    colHints.push(hints.length ? hints : [0]);
                }
                return { rowHints, colHints };
            }

            function setupGame() {
                const { rowHints, colHints } = generateHints();
                const gridEl = document.getElementById("grid");
                const rowEl = document.getElementById("row-hints");
                const colEl = document.getElementById("col-hints");

                gridEl.innerHTML = "";
                rowEl.innerHTML = "";
                colEl.innerHTML = "";

                rowHints.forEach((hints, index) => {
                    const div = document.createElement("div");
                    div.className = "hint-row";
                    div.id = `hint-row-${index}`;
                    div.innerHTML = hints.map((h) => `<span>${h}</span>`).join("");
                    rowEl.appendChild(div);
                });

                colHints.forEach((hints, index) => {
                    const div = document.createElement("div");
                    div.className = "hint-col";
                    div.id = `hint-col-${index}`;
                    div.innerHTML = hints.map((h) => `<span>${h}</span>`).join("");
                    colEl.appendChild(div);
                });

                for (let r = 0; r < 10; r++) {
                    for (let c = 0; c < 10; c++) {
                        const cell = document.createElement("div");
                        cell.className = "cell";
                        cell.dataset.row = r;
                        cell.dataset.col = c;

                        cell.addEventListener("contextmenu", (e) => e.preventDefault());

                        cell.addEventListener("mousedown", (e) => {
                            e.preventDefault();
                            isDrawing = true;
                            currentMode = e.button === 2 ? "cross" : "fill";
                            handleCellAction(cell, r, c);
                        });

                        cell.addEventListener("mouseenter", () => {
                            if (isDrawing) handleCellAction(cell, r, c);
                        });

                        gridEl.appendChild(cell);
                    }
                }

                window.addEventListener("mouseup", () => {
                    if (isDrawing) {
                        isDrawing = false;
                        drawType = null;
                        checkLineStatus();
                    }
                });
            }
            function updateAdjacentHighlights() {
                // 1. Clear existing classes
                document.querySelectorAll(".cell").forEach((c) => {
                    c.classList.remove("adjacent", "above-is-filled", "below-is-filled");
                });

                const directions = [
                    [-1, 0],
                    [1, 0],
                    [0, -1],
                    [0, 1]
                ];

                for (let r = 0; r < 10; r++) {
                    for (let c = 0; c < 10; c++) {
                        if (userGrid[r][c] === 1) {
                            // Standard 4-way adjacent highlights for surrounding empty cells
                            directions.forEach(([dr, dc]) => {
                                const nr = r + dr;
                                const nc = c + dc;
                                if (nr >= 0 && nr < 10 && nc >= 0 && nc < 10) {
                                    if (userGrid[nr][nc] !== 1) {
                                        const neighborEl = document.querySelector(
                                            `.cell[data-row="${nr}"][data-col="${nc}"]`
                                        );
                                        if (neighborEl) neighborEl.classList.add("adjacent");
                                    }
                                }
                            });

                            // Tag ANY cell BELOW a filled cell with 'above-is-filled'
                            const rowBelow = r + 1;
                            if (rowBelow < 10) {
                                const cellBelowEl = document.querySelector(
                                    `.cell[data-row="${rowBelow}"][data-col="${c}"]`
                                );
                                if (cellBelowEl) {
                                    cellBelowEl.classList.add("above-is-filled");
                                }
                            }

                            // Tag ANY cell ABOVE a filled cell with 'below-is-filled'
                            const rowAbove = r - 1;
                            if (rowAbove >= 0) {
                                const cellAboveEl = document.querySelector(
                                    `.cell[data-row="${rowAbove}"][data-col="${c}"]`
                                );
                                if (cellAboveEl) {
                                    cellAboveEl.classList.add("below-is-filled");
                                }
                            }
                        }
                    }
                }
            }
            function handleCellAction(cell, r, c) {
                if (currentMode === "fill") {
                    if (drawType === null) drawType = cell.classList.contains("filled") ? "clear" : "fill";
                    if (drawType === "fill") {
                        cell.classList.remove("crossed");
                        cell.classList.add("filled");
                        userGrid[r][c] = 1;
                    } else {
                        cell.classList.remove("filled");
                        userGrid[r][c] = 0;
                    }
                } else if (currentMode === "cross") {
                    if (drawType === null) drawType = cell.classList.contains("crossed") ? "clear" : "cross";
                    if (drawType === "cross") {
                        cell.classList.remove("filled");
                        cell.classList.add("crossed");
                        userGrid[r][c] = 0;
                    } else {
                        cell.classList.remove("crossed");
                    }
                }

                updateAdjacentHighlights();
            }

            function checkLineStatus() {
                let puzzleSolved = true;

                for (let r = 0; r < 10; r++) {
                    let rowCorrect = true;
                    for (let c = 0; c < 10; c++) {
                        if (solution[r][c] !== userGrid[r][c]) {
                            rowCorrect = false;
                            puzzleSolved = false;
                            break;
                        }
                    }
                    const rowHintEl = document.getElementById(`hint-row-${r}`);
                    if (rowHintEl) {
                        if (rowCorrect) rowHintEl.classList.add("completed");
                        else rowHintEl.classList.remove("completed");
                    }
                }

                for (let c = 0; c < 10; c++) {
                    let colCorrect = true;
                    for (let r = 0; r < 10; r++) {
                        if (solution[r][c] !== userGrid[r][c]) {
                            colCorrect = false;
                            puzzleSolved = false;
                            break;
                        }
                    }
                    const colHintEl = document.getElementById(`hint-col-${c}`);
                    if (colHintEl) {
                        if (colCorrect) colHintEl.classList.add("completed");
                        else colHintEl.classList.remove("completed");
                    }
                }

                if (puzzleSolved) {
                    document.getElementById("win-message").style.visibility = "visible";
                }
            }

            document.getElementById("mode-fill")?.addEventListener("click", () => (currentMode = "fill"));
            document.getElementById("mode-cross")?.addEventListener("click", () => (currentMode = "cross"));
            document.getElementById("reset-btn")?.addEventListener("click", () => {
                document.querySelectorAll(".cell").forEach((cell) => (cell.className = "cell"));
                for (let r = 0; r < 10; r++) userGrid[r].fill(0);
                document.querySelectorAll(".hint-row, .hint-col").forEach((el) => el.classList.remove("completed"));
                document.getElementById("win-message").style.visibility = "hidden";
                updateAdjacentHighlights();
            });
        </script>
    </body>
