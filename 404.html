<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>amiminnie</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="color-scheme" content="light dark" />
        <meta name="theme-color" content="#111111" />

        <meta property="og:title" content="amiminnie" />
        <meta property="og:description" content="my silly little site" />
        <meta property="og:type" content="website" />
        <meta property="og:image" content="https://amiminnie.github.io/images/heart.png" />
        <meta property="og:url" content="https://amiminnie.github.io" />

        <meta name="twitter:card" content="summary" />
        <meta name="twitter:image" content="https://amiminnie.github.io/images/heart.png" />

        <link id="theme-style" rel="stylesheet" href="/assets/styles/dark.css" />
        <link id="style" rel="stylesheet" href="/assets/styles/style.css" />
        <link id="icon" rel="icon" href="/images/favicon.ico" />

        <link rel="icon" href="/images/favicon.ico" />
        <link rel="apple-touch-icon" href="/images/heart.png" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Overlock:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap"
            rel="stylesheet" />
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    </head>

    <body>
        <div class="container">
            <header>
                <nav id="main-nav">
                    <button class="nav-back-btn" onclick="navigateToArticle('')">
                        <span class="material-symbols-outlined">arrow_back</span>
                        <span>back</span>
                    </button>

                    <a href="/">about</a>
                    <a href="/archive">archive</a>
                    <a href="/articles">articles</a>

                    <button id="theme-toggle" class="theme-btn" title="Dark mode extensions may interfere with this!">
                        <i class="bi bi-palette-fill"></i>
                    </button>
                </nav>
            </header>

            <main>
                <section class="intro">
                    <p class="prefix">where am i?</p>
                    <h1 style="color: var(--text-main)">
                        <span class="material-symbols-outlined"> attach_file_off </span> 404: resource not found
                    </h1>

                    <div class="bio">
                        <a href="/">
                            <span class="material-symbols-outlined" style="vertical-align: -5px; font-size: 18px">
                                home
                            </span>
                            go back home</a
                        >
                    </div>
                    <p class="subtitle">or play this little game!</p>
                </section>
            </main>

            <div class="nonogram-container">
                <div class="nonogram-wrapper">
                    <div class="corner"></div>
                    <div id="col-hints" class="col-hints"></div>
                    <div id="row-hints" class="row-hints"></div>
                    <div id="grid" class="grid"></div>
                </div>
                <p style="font-size: 12px; opacity: 0.6; margin-top: 10px; margin-bottom: 5px">
                    <span class="material-symbols-outlined" style="vertical-align: -5px"> left_click </span> Draw |
                    <span class="material-symbols-outlined" style="vertical-align: -5px"> right_click </span> Cross
                </p>
                <div id="win-message">Thanks for playing!</div>
            </div>

            <footer>
                <p>amiminnie</p>
            </footer>
        </div>

        <script>
            
            let solution = [];
            let currentMode = "fill";
            let isDrawing = false;
            let drawType = null;
            const userGrid = Array(10)
                .fill(null)
                .map(() => Array(10).fill(0));

            const atlasImage = new Image();
            atlasImage.src = "/assets/games/nonograms.png";

            atlasImage.onload = function () {
                const canvas = document.createElement("canvas");
                const ctx = canvas.getContext("2d");
                canvas.width = atlasImage.width;
                canvas.height = atlasImage.height;
                ctx.drawImage(atlasImage, 0, 0);

                const puzzles = [];
                const puzzleSize = 10;
                const colsInAtlas = atlasImage.width / puzzleSize;
                const rowsInAtlas = atlasImage.height / puzzleSize;

                for (let py = 0; py < rowsInAtlas; py++) {
                    for (let px = 0; px < colsInAtlas; px++) {
                        const gridMatrix = [];
                        const imgData = ctx.getImageData(px * puzzleSize, py * puzzleSize, puzzleSize, puzzleSize).data;

                        for (let r = 0; r < puzzleSize; r++) {
                            const row = [];
                            for (let c = 0; c < puzzleSize; c++) {
                                const index = (r * puzzleSize + c) * 4;
                                const rValue = imgData[index];
                                const gValue = imgData[index + 1];
                                const bValue = imgData[index + 2];
                                const alpha = imgData[index + 3];
                                const isFilled = alpha > 50 && !(rValue > 220 && gValue > 220 && bValue > 220);
                                row.push(isFilled ? 0 : 1);
                            }
                            gridMatrix.push(row);
                        }
                        puzzles.push(gridMatrix);
                    }
                }
                const selectedPuzzleIndex = Math.floor(Math.random() * puzzles.length);

                solution = puzzles[selectedPuzzleIndex];
                setupGame();
            };

            function generateHints() {
                const rowHints = [];
                for (let r = 0; r < 10; r++) {
                    let hints = [],
                        count = 0;
                    for (let c = 0; c < 10; c++) {
                        if (solution[r][c] === 1) count++;
                        else if (count > 0) {
                            hints.push(count);
                            count = 0;
                        }
                    }
                    if (count > 0) hints.push(count);
                    rowHints.push(hints.length ? hints : [0]);
                }

                const colHints = [];
                for (let c = 0; c < 10; c++) {
                    let hints = [],
                        count = 0;
                    for (let r = 0; r < 10; r++) {
                        if (solution[r][c] === 1) count++;
                        else if (count > 0) {
                            hints.push(count);
                            count = 0;
                        }
                    }
                    if (count > 0) hints.push(count);
                    colHints.push(hints.length ? hints : [0]);
                }
                return { rowHints, colHints };
            }

            function setupGame() {
                const { rowHints, colHints } = generateHints();
                const gridEl = document.getElementById("grid");
                const rowEl = document.getElementById("row-hints");
                const colEl = document.getElementById("col-hints");

                gridEl.innerHTML = "";
                rowEl.innerHTML = "";
                colEl.innerHTML = "";

                rowHints.forEach((hints, index) => {
                    const div = document.createElement("div");
                    div.className = "hint-row";
                    div.id = `hint-row-${index}`;
                    div.innerHTML = hints.map((h) => `<span>${h}</span>`).join("");
                    rowEl.appendChild(div);
                });

                colHints.forEach((hints, index) => {
                    const div = document.createElement("div");
                    div.className = "hint-col";
                    div.id = `hint-col-${index}`;
                    div.innerHTML = hints.map((h) => `<span>${h}</span>`).join("");
                    colEl.appendChild(div);
                });

                for (let r = 0; r < 10; r++) {
                    for (let c = 0; c < 10; c++) {
                        const cell = document.createElement("div");
                        cell.className = "cell";
                        cell.dataset.row = r;
                        cell.dataset.col = c;

                        cell.addEventListener("contextmenu", (e) => e.preventDefault());

                        cell.addEventListener("mousedown", (e) => {
                            e.preventDefault();
                            isDrawing = true;
                            currentMode = e.button === 2 ? "cross" : "fill";
                            handleCellAction(cell, r, c);
                        });

                        cell.addEventListener("mouseenter", () => {
                            if (isDrawing) handleCellAction(cell, r, c);
                        });

                        gridEl.appendChild(cell);
                    }
                }

                window.addEventListener("mouseup", () => {
                    if (isDrawing) {
                        isDrawing = false;
                        drawType = null;
                        checkLineStatus();
                    }
                });
            }

            function handleCellAction(cell, r, c) {
                if (currentMode === "fill") {
                    if (drawType === null) drawType = cell.classList.contains("filled") ? "clear" : "fill";
                    if (drawType === "fill") {
                        cell.classList.remove("crossed");
                        cell.classList.add("filled");
                        userGrid[r][c] = 1;
                    } else {
                        cell.classList.remove("filled");
                        userGrid[r][c] = 0;
                    }
                } else if (currentMode === "cross") {
                    if (drawType === null) drawType = cell.classList.contains("crossed") ? "clear" : "cross";
                    if (drawType === "cross") {
                        cell.classList.remove("filled");
                        cell.classList.add("crossed");
                        userGrid[r][c] = 0;
                    } else {
                        cell.classList.remove("crossed");
                    }
                }
            }

            function checkLineStatus() {
                let puzzleSolved = true;

                for (let r = 0; r < 10; r++) {
                    let rowCorrect = true;
                    for (let c = 0; c < 10; c++) {
                        if (solution[r][c] !== userGrid[r][c]) {
                            rowCorrect = false;
                            puzzleSolved = false;
                            break;
                        }
                    }
                    const rowHintEl = document.getElementById(`hint-row-${r}`);
                    if (rowHintEl) {
                        if (rowCorrect) rowHintEl.classList.add("completed");
                        else rowHintEl.classList.remove("completed");
                    }
                }

                for (let c = 0; c < 10; c++) {
                    let colCorrect = true;
                    for (let r = 0; r < 10; r++) {
                        if (solution[r][c] !== userGrid[r][c]) {
                            colCorrect = false;
                            puzzleSolved = false;
                            break;
                        }
                    }
                    const colHintEl = document.getElementById(`hint-col-${c}`);
                    if (colHintEl) {
                        if (colCorrect) colHintEl.classList.add("completed");
                        else colHintEl.classList.remove("completed");
                    }
                }

                if (puzzleSolved) {
                    document.getElementById("win-message").style.visibility = "visible";
                }
            }

            document.getElementById("mode-fill")?.addEventListener("click", () => (currentMode = "fill"));
            document.getElementById("mode-cross")?.addEventListener("click", () => (currentMode = "cross"));
            document.getElementById("reset-btn")?.addEventListener("click", () => {
                document.querySelectorAll(".cell").forEach((cell) => (cell.className = "cell"));
                for (let r = 0; r < 10; r++) userGrid[r].fill(0);
                document.querySelectorAll(".hint-row, .hint-col").forEach((el) => el.classList.remove("completed"));
                document.getElementById("win-message").style.visibility = "hidden";
            });
        </script>
    </body>
</html>
